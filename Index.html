<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spence Contracting</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;min-height:100vh}
button,select,input,textarea{-webkit-appearance:none;font-family:inherit}
.topbar{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
.sync-bar{background:#162236;padding:5px 16px;display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.45);gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s}
.btn-orange{background:#E8713A;border:none;border-radius:9px;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-dark{background:#1A1A2E;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-green{background:#2EAA72;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-red{background:#E83A6C;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn-ghost{background:#fff;border:1.5px solid #E0E0E0;border-radius:10px;color:#666;padding:12px;font-size:14px;cursor:pointer;flex:1}
.btn-dashed{width:100%;padding:12px;border:1.5px dashed #CCC;border-radius:10px;background:#fff;color:#888;font-size:13px;cursor:pointer;margin-top:6px;text-align:center}
.btn-blue{background:#3A78E8;border:none;border-radius:8px;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-notify{background:#9B6BE8;border:none;border-radius:8px;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.page{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:40;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.show{display:block}
.phead{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:10}
.phead-title{color:#fff;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:8px}
.ptabs{display:flex;background:#fff;border-bottom:1px solid #EBEBEB;overflow-x:auto;position:sticky;top:56px;z-index:9;-webkit-overflow-scrolling:touch}
.ptab{border:none;background:none;padding:14px 14px;font-size:12px;color:#aaa;border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;min-height:48px;cursor:pointer}
.ptab.on{color:#1A1A2E;font-weight:700}
.pbody{padding:14px 14px 100px}
.fpage{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:60;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fpage.show{display:block}
.fi{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:11px 12px;font-size:14px;outline:none;color:#333;background:#fff}
.fl{font-size:10px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;display:block}
.fg{display:grid;gap:12px;margin-bottom:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fbtns{display:flex;gap:10px}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #EBEBEB;cursor:pointer;margin-bottom:12px}
.card-name{font-size:15px;font-weight:700;color:#1A1A2E}
.card-sub{font-size:11px;color:#888;margin-top:3px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.brow{margin-bottom:8px}
.blr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#aaa}
.bt{background:#EEE;border-radius:5px;height:6px}
.bf{height:100%;border-radius:5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.scard{background:#fff;border-radius:11px;padding:11px 10px;border:1px solid #EBEBEB}
.scard .si{font-size:15px;margin-bottom:3px}
.scard .sv{font-size:17px;font-weight:700;color:#1A1A2E}
.scard .sl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.wcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:4px}
.item-card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;border:1px solid #F0F0F0}
.del-btn{background:none;border:none;color:#E83A6C;font-size:22px;padding:2px 6px;line-height:1;cursor:pointer;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bva-row{display:flex;gap:8px;margin-top:8px}
.bva-box{flex:1;background:#F8F8F8;border-radius:8px;padding:8px 10px}
.bva-label{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.bva-val{font-size:14px;font-weight:700}
.inline-form{background:#EEF2F7;border-radius:12px;padding:14px;margin-top:8px;border:1.5px solid #DDE3EC;display:none}
.iboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ibox{background:#fff;border-radius:10px;padding:12px 14px}
.ibl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.ibv{font-size:15px;font-weight:700;color:#1A1A2E;margin-top:2px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sbox{background:#fff;border-radius:10px;padding:12px}
.sbox-label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.sbox-val{font-size:16px;font-weight:700;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:6px;background:#EEF4FF;color:#2855B8;border-radius:20px;padding:5px 12px;font-size:13px;margin:3px}
.tag button{background:none;border:none;color:#E83A6C;font-size:17px;line-height:1;padding:0;cursor:pointer}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{border:1.5px solid #E0E0E0;background:#fff;color:#666;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.fb.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
.controls{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
#cards{padding:0 14px 80px}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.punch-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #F0F0F0}
.punch-cb{width:22px;height:22px;border-radius:6px;border:2px solid #CCC;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.punch-cb.done{background:#2EAA72;border-color:#2EAA72;color:#fff}
.punch-text{flex:1;font-size:14px;color:#333}
.punch-text.done{text-decoration:line-through;color:#aaa}
.co-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.log-date{font-size:11px;color:#aaa;margin-bottom:4px}
.log-text{font-size:13px;color:#444;line-height:1.5}
/* View toggle */
.view-toggle{display:flex;gap:6px;margin-bottom:14px}
.vt-btn{flex:1;padding:9px;border:1.5px solid #E0E0E0;border-radius:9px;background:#fff;font-size:12px;font-weight:600;color:#666;cursor:pointer}
.vt-btn.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
/* Gantt */
.gantt-wrap{overflow-x:auto;background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.gantt-header{display:flex;margin-bottom:8px;padding-left:120px}
.gantt-month{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;flex-shrink:0;text-align:center}
.gantt-row{display:flex;align-items:center;margin-bottom:8px;min-height:32px}
.gantt-label{width:120px;font-size:12px;font-weight:600;color:#333;flex-shrink:0;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;background:#F0F0F0;border-radius:20px;height:24px;position:relative;min-width:200px}
.gantt-bar{position:absolute;height:100%;border-radius:20px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;min-width:4px}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:700;color:#1A1A2E}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#aaa;padding:4px 0}
.cal-day{min-height:52px;border-radius:8px;padding:4px;background:#fff;border:1px solid #F0F0F0;font-size:11px}
.cal-day.other-month{background:#F8F8F8;color:#ccc}
.cal-day.today{border-color:#E8713A;background:#FFF8F5}
.cal-day-num{font-weight:700;color:#333;margin-bottom:2px}
.cal-event{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;color:#fff;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Edit modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:80;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#1A1A2E;margin-bottom:14px}
</style>
</head>
<body>

<div id="mainView">
  <div class="topbar">
    <h1>🏗️ Spence Contracting</h1>
    <div style="display:flex;gap:8px">
      <button class="btn-orange" style="background:rgba(255,255,255,0.15)" onclick="openSettings()">⚙️</button>
      <button class="btn-orange" id="btnNew">+ New</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sdot" id="syncDot"></div><span id="syncLabel">Connecting...</span></div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="fi" id="searchInput" placeholder="Search projects..." type="search"/>
    <div class="filters" id="filters"></div>
  </div>
  <div id="cards"><div class="empty">Loading...</div></div>
</div>

<!-- PROJECT DETAIL -->
<div class="page" id="detailPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('detailPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title" id="dName"></span>
    <span class="pbadge" id="dBadge"></span>
  </div>
  <div class="ptabs" id="tabs"></div>
  <div class="pbody" id="tabBody"></div>
</div>

<!-- ADD/EDIT PROJECT -->
<div class="fpage" id="addPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('addPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title" id="addPageTitle">New Project</span>
  </div>
  <div style="padding:14px">
    <div class="fg">
      <div><label class="fl">Client Name *</label><input class="fi" id="fClient" placeholder="e.g. Johnson Residence"/></div>
      <div><label class="fl">Project Type *</label><input class="fi" id="fType" placeholder="e.g. Kitchen Remodel"/></div>
      <div><label class="fl">Address</label><input class="fi" id="fAddress" placeholder="123 Main St"/></div>
      <div><label class="fl">Project Manager</label><input class="fi" id="fPm" placeholder="Name"/></div>
      <div class="fr2">
        <div><label class="fl">Start Date</label><input class="fi" id="fStart" type="date"/></div>
        <div><label class="fl">End Date</label><input class="fi" id="fEnd" type="date"/></div>
      </div>
      <div class="fr2">
        <div><label class="fl">Budget ($)</label><input class="fi" id="fBudget" type="number" placeholder="0"/></div>
        <div><label class="fl">Spent ($)</label><input class="fi" id="fSpent" type="number" placeholder="0"/></div>
      </div>
      <div><label class="fl">Status</label><select class="fi" id="fStatus"></select></div>
      <div><label class="fl">Notes</label><textarea class="fi" id="fNotes" rows="3" placeholder="Key contacts, special instructions..."></textarea></div>
      <div><label class="fl">Color</label><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="fbtns">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-dark" style="flex:2" id="saveBtn">Save Project</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="fpage" id="settingsPage">
  <div class="phead">
    <a href="#" onclick="closeSettings();return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title">Settings & Dropdowns</span>
  </div>
  <div style="padding:14px">
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Project Statuses</label><div id="psTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="psInput" placeholder="Add status..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('projectStatuses','psInput','psTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Phase Types</label><div id="ptTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="ptInput" placeholder="Add phase..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('phaseTypes','ptInput','ptTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Selection Statuses</label><div id="csTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="csInput" placeholder="Add status..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('choiceStatuses','csInput','csTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Cost Categories</label><div id="ccTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="ccInput" placeholder="Add category..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('costCategories','ccInput','ccTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Change Order Types</label><div id="coTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="coInput" placeholder="Add type..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('changeOrderTypes','coInput','coTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Punch List Categories</label><div id="plTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="plInput" placeholder="Add category..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('punchCategories','plInput','plTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Subcontractors / Employees</label><div id="subTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="subInput" placeholder="Name, phone, email..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('subcontractors','subInput','subTagsEl')">Add</button></div></div>
  </div>
</div>

<!-- EDIT PHASE MODAL -->
<div class="modal-overlay" id="editPhaseModal">
  <div class="modal-box">
    <div class="modal-title">Edit Phase</div>
    <div class="fg">
      <div><label class="fl">Phase Name</label><input class="fi" id="epName"/></div>
      <div class="fr2">
        <div><label class="fl">Start</label><input class="fi" id="epStart" type="date"/></div>
        <div><label class="fl">End</label><input class="fi" id="epEnd" type="date"/></div>
      </div>
      <div class="fr2">
        <div><label class="fl">Budget ($)</label><input class="fi" id="epBudget" type="number"/></div>
        <div><label class="fl">Actual ($)</label><input class="fi" id="epActual" type="number"/></div>
      </div>
      <div><label class="fl">Status</label>
        <select class="fi" id="epStatus">
          <option>Not Started</option><option>In Progress</option><option>Complete</option>
        </select>
      </div>
      <div><label class="fl">Assign To</label><select class="fi" id="epAssign"></select></div>
      <div><label class="fl">Assignee Phone</label><input class="fi" id="epPhone" placeholder="e.g. 555-0100"/></div>
      <div><label class="fl">Assignee Email</label><input class="fi" id="epEmail" placeholder="e.g. sub@email.com"/></div>
    </div>
    <div class="fbtns">
      <button class="btn-ghost" onclick="closeEditPhase()">Cancel</button>
      <button class="btn-dark" style="flex:2" onclick="saveEditPhase()">Save Changes</button>
    </div>
  </div>
</div>

<!-- EDIT CHOICE MODAL -->
<div class="modal-overlay" id="editChoiceModal">
  <div class="modal-box">
    <div class="modal-title">Edit Selection</div>
    <div class="fg">
      <div><label class="fl">Category</label><input class="fi" id="ecCat"/></div>
      <div><label class="fl">Item</label><input class="fi" id="ecItem"/></div>
      <div><label class="fl">Vendor</label><input class="fi" id="ecVendor"/></div>
      <div><label class="fl">Notes</label><input class="fi" id="ecNotes"/></div>
      <div><label class="fl">Status</label><select class="fi" id="ecStatus"></select></div>
      <div class="fr2">
        <div><label class="fl">Budget ($)</label><input class="fi" id="ecBudget" type="number"/></div>
        <div><label class="fl">Actual ($)</label><input class="fi" id="ecActual" type="number"/></div>
      </div>
    </div>
    <div class="fbtns">
      <button class="btn-ghost" onclick="closeEditChoice()">Cancel</button>
      <button class="btn-dark" style="flex:2" onclick="saveEditChoice()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function T(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function fmt(d){if(!d)return"—";var p=d.split("-");return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1])-1]+" "+parseInt(p[2]);}
function fmtFull(d){if(!d)return"";var p=d.split("-");return["January","February","March","April","May","June","July","August","September","October","November","December"][parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[0];}
function daysLeft(e){return Math.ceil((new Date(e)-new Date())/86400000);}
function gp(p){if(!p.phases||!p.phases.length)return 0;var d=p.phases.filter(function(x){return x.complete==="Complete";}).length;return Math.round(d/p.phases.length*100);}
function gpr(){return projects.find(function(x){return x.id===currentId;});}
function sc(s){var i=DD.projectStatuses.indexOf(s);var c=STATUS_COLORS[i%STATUS_COLORS.length]||"#999";return{bg:c+"22",text:c,dot:c};}
function bvaHtml(b,a){
  var b2=parseFloat(b)||0,a2=parseFloat(a)||0,diff=b2-a2,over=diff<0;
  var dc=over?"#E83A6C":"#2EAA72",dl=over?"$"+Math.abs(diff).toLocaleString()+" over":"$"+Math.abs(diff).toLocaleString()+" under";
  return'<div class="bva-row"><div class="bva-box"><div class="bva-label">Budget</div><div class="bva-val" style="color:#1A1A2E">$'+b2.toLocaleString()+'</div></div><div class="bva-box"><div class="bva-label">Actual</div><div class="bva-val" style="color:#E8713A">$'+a2.toLocaleString()+'</div></div><div class="bva-box"><div class="bva-label">Variance</div><div class="bva-val" style="color:'+dc+'">'+dl+'</div></div></div>';
}
function setSS(s){var dot=document.getElementById("syncDot"),lbl=document.getElementById("syncLabel");if(s==="live"){dot.style.background="#2EAA72";lbl.textContent="Live sync on";}else if(s==="saving"){dot.style.background="#E8B43A";lbl.textContent="Saving...";}else if(s==="error"){dot.style.background="#E83A6C";lbl.textContent="Sync error";}}

function saveP(p){setSS("saving");return col.doc(p.id).set(p).then(function(){T("✅ Saved!");}).catch(function(){T("❌ Error");setSS("error");});}

function startSync(){
  col.orderBy("client").onSnapshot(function(snap){
    if(snap.empty){var b=db.batch();SEED.forEach(function(p){b.set(col.doc(p.id),p);});b.commit();return;}
    projects=[];snap.forEach(function(d){projects.push(d.data());});
    setSS("live");renderAll();
    if(currentId&&document.getElementById("detailPage").classList.contains("show")){var p=gpr();if(p){renderTabs(p);renderTabBody(p);}}
  },function(){setSS("error");});
}

// ---- GANTT CHART ----
function renderGantt(p){
  var phases=p.phases||[];
  if(!phases.length)return'<div style="color:#bbb;font-size:13px;padding:20px;text-align:center">No phases added yet.</div>';
  // Find date range
  var minD=null,maxD=null;
  phases.forEach(function(ph){
    if(ph.start){var d=new Date(ph.start);if(!minD||d<minD)minD=d;}
    if(ph.end){var d=new Date(ph.end);if(!maxD||d>maxD)maxD=d;}
  });
  if(!minD||!maxD)return'<div style="color:#bbb;font-size:13px;padding:20px;text-align:center">Add start/end dates to phases to see Gantt chart.</div>';
  var totalDays=(maxD-minD)/86400000+1;
  // Build month headers
  var months=[],cur=new Date(minD);cur.setDate(1);
  while(cur<=maxD){months.push(new Date(cur));cur.setMonth(cur.getMonth()+1);}
  var html='<div class="gantt-wrap"><div style="overflow-x:auto">';
  // Header
  html+='<div style="display:flex;margin-bottom:8px;padding-left:130px">';
  months.forEach(function(m){
    var mStart=new Date(m);var mEnd=new Date(m);mEnd.setMonth(mEnd.getMonth()+1);mEnd.setDate(0);
    var s=Math.max(0,(mStart-minD)/86400000);var e=Math.min(totalDays,(mEnd-minD)/86400000+1);
    var w=((e-s)/totalDays*100).toFixed(1);
    html+='<div style="width:'+w+'%;font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;flex-shrink:0">'+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m.getMonth()]+'</div>';
  });
  html+='</div>';
  // Rows
  phases.forEach(function(ph,i){
    if(!ph.start||!ph.end){html+='<div class="gantt-row"><div class="gantt-label">'+ph.name+'</div><div style="font-size:11px;color:#aaa;flex:1">No dates set</div></div>';return;}
    var s=Math.max(0,(new Date(ph.start)-minD)/86400000);
    var e=Math.min(totalDays,(new Date(ph.end)-minD)/86400000+1);
    var left=(s/totalDays*100).toFixed(1);
    var width=Math.max(0.5,((e-s)/totalDays*100)).toFixed(1);
    var clr=ph.complete==="Complete"?"#2EAA72":ph.complete==="In Progress"?"#E8713A":"#3A78E8";
    html+='<div class="gantt-row"><div class="gantt-label" title="'+ph.name+'">'+ph.name+'</div><div class="gantt-track"><div class="gantt-bar" style="left:'+left+'%;width:'+width+'%;background:'+clr+'">'+ph.name+'</div></div></div>';
  });
  html+='</div></div>';
  return html;
}

// ---- CALENDAR ----
function renderCalendar(p){
  var phases=p.phases||[];
  var y=calMonth.getFullYear(),mo=calMonth.getMonth();
  var monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var html='<div class="wcard">';
  html+='<div class="cal-nav"><button onclick="calPrev()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#1A1A2E">‹</button><span class="cal-title">'+monthNames[mo]+" "+y+'</span><button onclick="calNext()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#1A1A2E">›</button></div>';
  html+='<div class="cal-grid">';
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  var firstDay=new Date(y,mo,1).getDay();
  var daysInMonth=new Date(y,mo+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);
  for(var i=0;i<firstDay;i++)html+='<div class="cal-day other-month"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var thisDate=new Date(y,mo,d);thisDate.setHours(0,0,0,0);
    var isToday=thisDate.getTime()===today.getTime();
    html+='<div class="cal-day'+(isToday?" today":"")+'"><div class="cal-day-num">'+d+'</div>';
    phases.forEach(function(ph){
      if(!ph.start||!ph.end)return;
      var s=new Date(ph.start);s.setHours(0,0,0,0);
      var e=new Date(ph.end);e.setHours(0,0,0,0);
      if(thisDate>=s&&thisDate<=e){
        var clr=ph.complete==="Complete"?"#2EAA72":ph.complete==="In Progress"?"#E8713A":"#3A78E8";
        html+='<div class="cal-event" style="background:'+clr+'" title="'+ph.name+'">'+ph.name+'</div>';
      }
    });
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}

function calPrev(){calMonth.setMonth(calMonth.getMonth()-1);var p=gpr();if(p)renderTabBody(p);}
function calNext(){calMonth.setMonth(calMonth.getMonth()+1);var p=gpr();if(p)renderTabBody(p);}

function notifySubcontractor(phaseIdx){
  var p=gpr();var ph=p.phases[phaseIdx];
  var name=ph.assignTo||"Subcontractor";
  var phone=ph.assignPhone||"";
  var email=ph.assignEmail||"";
  var msg="Hi "+name+", you have been assigned to the following task:%0A%0A"
    +"Project: "+p.client+"%0ATask: "+ph.name+"%0AStart: "+fmtFull(ph.start)+"%0AEnd: "+fmtFull(ph.end)+"%0ABudget: $"+(ph.phaseBudget||0).toLocaleString()+"%0AStatus: "+ph.complete+"%0A%0APlease confirm your availability by replying to this message.%0A%0AThank you,%0ASpence Contracting";
  var emailMsg=msg.replace(/%0A/g,"\n");
  if(phone){window.open("sms:"+phone+"?body="+msg);}
  if(email){
    var subject="Task Assignment: "+ph.name+" - "+p.client;
    setTimeout(function(){window.open("mailto:"+email+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(emailMsg));},phone?1000:0);
  }
  if(!phone&&!email){alert("Please add phone and email for this assignee first.");}
}

function setView(v){timelineView=v;var p=gpr();if(p)renderTabBody(p);}
function showForm(id){var el=document.getElementById(id);if(el)el.style.display="block";}
function hideForm(id){var el=document.getElementById(id);if(el)el.style.display="none";}

// Phase CRUD
function addPhase(){
  var sel=document.getElementById("pSel"),name=sel.value==="__c__"?document.getElementById("pCustom").value.trim():sel.value;
  if(!name){alert("Enter a phase name.");return;}
  var p=gpr();p.phases=p.phases||[];
  p.phases.push({name:name,start:document.getElementById("pSt").value,end:document.getElementById("pEn").value,phaseBudget:parseFloat(document.getElementById("pBud").value)||0,phaseActual:parseFloat(document.getElementById("pAct").value)||0,complete:"Not Started",assignTo:document.getElementById("pAssign").value,assignPhone:"",assignEmail:""});
  saveP(p);
}
function delPhase(i){if(!confirm("Delete phase?"))return;var p=gpr();p.phases.splice(i,1);saveP(p);}
function updatePhaseStatus(i,v){var p=gpr();p.phases[i].complete=v;saveP(p);}

// Choice CRUD
function addChoice(){var cat=document.getElementById("cCat").value.trim(),item=document.getElementById("cItem").value.trim();if(!cat||!item){alert("Enter category and item.");return;}var p=gpr();p.choices=p.choices||[];p.choices.push({category:cat,item:item,vendor:document.getElementById("cVend").value.trim(),notes:document.getElementById("cNotes").value.trim(),status:document.getElementById("cStat").value,budgetAmt:parseFloat(document.getElementById("cBud").value)||0,actualAmt:parseFloat(document.getElementById("cAct").value)||0});saveP(p);}
function delChoice(i){if(!confirm("Delete?"))return;var p=gpr();p.choices.splice(i,1);saveP(p);}
function updateChoiceStatus(i,v){var p=gpr();p.choices[i].status=v;saveP(p);}

// Cost CRUD
function addCost(){var p=gpr();p.costs=p.costs||[];var b=parseFloat(document.getElementById("costB").value)||0,a=parseFloat(document.getElementById("costA").value)||0;p.costs.push({category:document.getElementById("costCat").value,description:document.getElementById("costDesc").value.trim(),budgetAmt:b,actualAmt:a});p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function delCost(i){if(!confirm("Delete?"))return;var p=gpr();p.costs.splice(i,1);p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function updateCostAmt(i,k,v){var p=gpr();p.costs[i][k]=parseFloat(v)||0;p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function saveBudgetTotals(){var p=gpr();p.budget=parseFloat(document.getElementById("bBud").value)||0;p.spent=parseFloat(document.getElementById("bSpt").value)||0;saveP(p);}

// Punch List
function addPunch(){var text=document.getElementById("plText").value.trim();if(!text){alert("Enter an item.");return;}var p=gpr();p.punchList=p.punchList||[];p.punchList.push({text:text,category:document.getElementById("plCat").value,done:false});saveP(p);}
function delPunch(i){if(!confirm("Delete?"))return;var p=gpr();p.punchList.splice(i,1);saveP(p);}
function togglePunch(i){var p=gpr();p.punchList[i].done=!p.punchList[i].done;saveP(p);}

// Change Orders
function addCO(){var title=document.getElementById("coTitle").value.trim();if(!title){alert("Enter a title.");return;}var p=gpr();p.changeOrders=p.changeOrders||[];p.changeOrders.push({title:title,type:document.getElementById("coType").value,description:document.getElementById("coDesc").value.trim(),budgetImpact:parseFloat(document.getElementById("coBudget").value)||0,date:document.getElementById("coDate").value,status:document.getElementById("coStatus").value});saveP(p);}
function delCO(i){if(!confirm("Delete?"))return;var p=gpr();p.changeOrders.splice(i,1);saveP(p);}
function updateCOStatus(i,v){var p=gpr();p.changeOrders[i].status=v;saveP(p);}

// Daily Log
function addLog(){var work=document.getElementById("logWork").value.trim();if(!work){alert("Enter work completed.");return;}var p=gpr();p.dailyLogs=p.dailyLogs||[];p.dailyLogs.push({date:document.getElementById("logDate").value,weather:document.getElementById("logWeather").value.trim(),crew:document.getElementById("logCrew").value.trim(),work:work,issues:document.getElementById("logIssues").value.trim()});saveP(p);}
function delLog(i){if(!confirm("Delete?"))return;var p=gpr();p.dailyLogs.splice(i,1);saveP(p);}

// Notes
function saveNotes(){var p=gpr();p.notes=document.getElementById("notesInput").value;saveP(p);}
function deleteProject(){if(!confirm("Delete project? Cannot be undone."))return;col.doc(currentId).delete().then(function(){document.getElementById("detailPage").classList.remove("show");T("Deleted");});}

// Add/Edit project
function populateStatus(val){document.getElementById("fStatus").innerHTML=DD.projectStatuses.map(function(x){return'<option'+(x===(val||DD.projectStatuses[0])?" selected":"")+'>'+x+'</option>';}).join("");}
function renderCP(){document.getElementById("cpick").innerHTML=COLORS.map(function(c,i){return'<div class="cdot" style="background:'+c+';border-color:'+(i===selColor?"#1A1A2E":"transparent")+'" data-ci="'+i+'"></div>';}).join("");document.querySelectorAll(".cdot").forEach(function(d){d.onclick=function(){selColor=parseInt(this.getAttribute("data-ci"));renderCP();};});}
function openAdd(){editId=null;document.getElementById("addPageTitle").textContent="New Project";["fClient","fType","fAddress","fPm","fStart","fEnd","fBudget","fSpent","fNotes"].forEach(function(id){document.getElementById(id).value="";});populateStatus();selColor=0;renderCP();var ap=document.getElementById("addPage");ap.classList.add("show");ap.scrollTop=0;}
function openEditProject(){var p=gpr();editId=p.id;document.getElementById("addPageTitle").textContent="Edit Project";document.getElementById("fClient").value=p.client||"";document.getElementById("fType").value=p.type||"";document.getElementById("fAddress").value=p.address||"";document.getElementById("fPm").value=p.pm||"";document.getElementById("fStart").value=p.startDate||"";document.getElementById("fEnd").value=p.endDate||"";document.getElementById("fBudget").value=p.budget||"";document.getElementById("fSpent").value=p.spent||"";document.getElementById("fNotes").value=p.notes||"";populateStatus(p.status);selColor=Math.max(0,COLORS.indexOf(p.color));renderCP();var ap=document.getElementById("addPage");ap.classList.add("show");ap.scrollTop=0;}
function saveProject(){var client=document.getElementById("fClient").value.trim(),type=document.getElementById("fType").value.trim();if(!client||!type){alert("Client name and project type required.");return;}var id=editId||("p"+Date.now()),existing=editId?(gpr()||{}):{};var p=Object.assign({},existing,{id:id,client:client,type:type,address:document.getElementById("fAddress").value.trim(),pm:document.getElementById("fPm").value.trim(),startDate:document.getElementById("fStart").value,endDate:document.getElementById("fEnd").value,budget:parseFloat(document.getElementById("fBudget").value)||0,spent:parseFloat(document.getElementById("fSpent").value)||0,status:document.getElementById("fStatus").value,notes:document.getElementById("fNotes").value.trim(),color:COLORS[selColor],choices:existing.choices||[],phases:existing.phases||[],costs:existing.costs||[],punchList:existing.punchList||[],changeOrders:existing.changeOrders||[],dailyLogs:existing.dailyLogs||[]});col.doc(id).set(p).then(function(){T(editId?"✅ Updated!":"✅ Added!");document.getElementById("addPage").classList.remove("show");if(editId)currentId=id;}).catch(function(){T("❌ Error");});}

// Settings
function openSettings(){renderTagSet("psTagsEl","projectStatuses");renderTagSet("ptTagsEl","phaseTypes");renderTagSet("csTagsEl","choiceStatuses");renderTagSet("ccTagsEl","costCategories");renderTagSet("coTagsEl","changeOrderTypes");renderTagSet("plTagsEl","punchCategories");renderTagSet("subTagsEl","subcontractors");document.getElementById("settingsPage").classList.add("show");}
function closeSettings(){document.getElementById("settingsPage").classList.remove("show");}
function renderTagSet(elId,key){document.getElementById(elId).innerHTML=(DD[key]||[]).map(function(s,i){return'<span class="tag">'+s+'<button onclick="removeTag(\''+key+'\','+i+',\''+elId+'\')">×</button></span>';}).join("");}
function addTag(key,inputId,elId){var v=document.getElementById(inputId).value.trim();if(!v||(DD[key]||[]).indexOf(v)>=0)return;DD[key]=DD[key]||[];DD[key].push(v);document.getElementById(inputId).value="";renderTagSet(elId,key);saveSettings();}
function removeTag(key,i,elId){DD[key].splice(i,1);renderTagSet(elId,key);saveSettings();}

document.getElementById("btnNew").onclick=openAdd;
document.getElementById("cancelBtn").onclick=function(){document.getElementById("addPage").classList.remove("show");};
document.getElementById("saveBtn").onclick=saveProject;
document.getElementById("searchInput").oninput=renderCards;

loadSettings(function(){startSync();});
</script>
