<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spence Contracting</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;min-height:100vh}
button{-webkit-appearance:none;cursor:pointer}
.topbar{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
#btnNew{background:#E8713A;border:none;border-radius:9px;color:#fff;padding:9px 15px;font-size:13px;font-weight:700}
.sync-bar{background:#1e2d4a;padding:5px 16px;display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.5);gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 12px 0}
.scard{background:#fff;border-radius:11px;padding:11px 10px;border:1px solid #E8EAED}
.scard .si{font-size:15px;margin-bottom:3px}
.scard .sv{font-size:17px;font-weight:700;color:#1A1A2E}
.scard .sl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.controls{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.fi{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;color:#333;background:#fff;-webkit-appearance:none}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{border:1.5px solid #E0E0E0;background:#fff;color:#666;padding:6px 12px;border-radius:8px;font-size:12px}
.fb.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
#cards{padding:0 12px 80px;display:grid;gap:12px}
.card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #E8EAED;cursor:pointer}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-name{font-size:15px;font-weight:700;color:#1A1A2E}
.card-sub{font-size:11px;color:#888;margin-top:3px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.meta{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.ml{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:12px;font-weight:600;color:#333}
.brow{margin-bottom:7px}
.blr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#aaa}
.bt{background:#EEE;border-radius:5px;height:5px}
.bf{height:100%;border-radius:5px}

/* PAGES */
.page{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:40;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.show{display:block}
.phead{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;gap:8px;height:54px;position:sticky;top:0;z-index:10}
.backbtn{background:none;border:none;color:#E8713A;font-size:22px;font-weight:700;padding:8px 12px 8px 0;min-width:44px;min-height:44px;display:flex;align-items:center}
.phead h2{color:#fff;font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.ptabs{display:flex;background:#fff;border-bottom:1px solid #F0F0F0;overflow-x:auto;position:sticky;top:54px;z-index:9}
.ptab{border:none;background:none;padding:13px 16px;font-size:13px;color:#999;border-bottom:3px solid transparent;white-space:nowrap;font-weight:400;min-height:44px}
.ptab.on{color:#1A1A2E;font-weight:700}
.pbody{padding:16px 16px 100px}

/* FORM PAGE */
.fpage{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:60;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fpage.show{display:block}
.fg{display:grid;gap:10px;margin-bottom:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fl{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.fbtns{display:flex;gap:10px}
.fbc{flex:1;padding:13px;border:1.5px solid #E0E0E0;border-radius:10px;background:#fff;font-size:14px;color:#666}
.fbs{flex:2;padding:13px;border:none;border-radius:10px;background:#1A1A2E;font-size:14px;color:#fff;font-weight:700}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent}

/* DETAIL CONTENT */
.white-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.add-btn{width:100%;padding:12px;border:1.5px dashed #CCC;border-radius:10px;background:#fff;color:#888;font-size:13px;margin-top:4px}
.item-card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;border:1px solid #F0F0F0}
.del-btn{background:none;border:none;color:#E83A6C;font-size:20px;padding:0 4px;line-height:1;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.cba{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.iboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ibox{background:#fff;border-radius:10px;padding:12px 14px}
.ibl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.ibv{font-size:15px;font-weight:700;color:#1A1A2E;margin-top:2px}
.bboxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.bbox{background:#fff;border-radius:10px;padding:12px}
.bbl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.bbv{font-size:16px;font-weight:700;margin-top:4px}
.green-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#2EAA72;color:#fff;font-size:15px;font-weight:700;margin-top:10px}
.red-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#E83A6C;color:#fff;font-size:15px;font-weight:700;margin-top:8px}
.dark-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#1A1A2E;color:#fff;font-size:15px;font-weight:700}
.inline-form{background:#F4F5F7;border-radius:12px;padding:14px;margin-top:10px;border:1.5px solid #E8EAED}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;line-height:1.6}

/* Settings page */
.settings-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;gap:6px;background:#EEF4FF;color:#2855B8;border-radius:20px;padding:5px 12px;font-size:13px;margin:4px}
.tag button{background:none;border:none;color:#E83A6C;font-size:16px;line-height:1;padding:0}
</style>

</head>
<body>

<!-- MAIN -->

<div id="mainView">
  <div class="topbar">
    <h1>🏗️ Spence Contracting</h1>
    <div style="display:flex;gap:8px">
      <button onclick="openSettings()" style="background:rgba(255,255,255,0.15);border:none;border-radius:9px;color:#fff;padding:9px 12px;font-size:13px">⚙️</button>
      <button id="btnNew">+ New</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sdot" id="syncDot"></div><span id="syncLabel">Connecting...</span></div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="fi" id="searchInput" placeholder="Search by client or job type..." type="search"/>
    <div class="filters" id="filters"></div>
  </div>
  <div id="cards"><div class="empty">Loading...</div></div>
</div>

<!-- DETAIL PAGE -->

<div class="page" id="detailPage">
  <div class="phead">
    <button class="backbtn" id="backBtn">‹</button>
    <h2 id="dName"></h2>
    <span class="pbadge" id="dBadge"></span>
  </div>
  <div class="ptabs" id="tabs"></div>
  <div class="pbody" id="tabBody"></div>
</div>

<!-- ADD/EDIT PROJECT PAGE -->

<div class="fpage" id="addPage">
  <div class="phead">
    <button class="backbtn" id="addBackBtn">‹</button>
    <h2 id="addPageTitle">New Project</h2>
  </div>
  <div style="padding:16px">
    <div class="fg">
      <div><div class="fl">Client Name *</div><input class="fi" id="fClient" placeholder="e.g. Johnson Residence"/></div>
      <div><div class="fl">Project Type *</div><input class="fi" id="fType" placeholder="e.g. Kitchen Remodel"/></div>
      <div><div class="fl">Address</div><input class="fi" id="fAddress" placeholder="123 Main St"/></div>
      <div><div class="fl">Project Manager</div><input class="fi" id="fPm" placeholder="Name"/></div>
      <div class="fr2">
        <div><div class="fl">Start Date</div><input class="fi" id="fStart" type="date"/></div>
        <div><div class="fl">End Date</div><input class="fi" id="fEnd" type="date"/></div>
      </div>
      <div class="fr2">
        <div><div class="fl">Budget ($)</div><input class="fi" id="fBudget" type="number" placeholder="0"/></div>
        <div><div class="fl">Spent ($)</div><input class="fi" id="fSpent" type="number" placeholder="0"/></div>
      </div>
      <div><div class="fl">Status</div>
        <select class="fi" id="fStatus"></select>
      </div>
      <div><div class="fl">Notes</div><textarea class="fi" id="fNotes" rows="3" placeholder="Key contacts, special instructions..."></textarea></div>
      <div><div class="fl">Color</div><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="fbtns">
      <button class="fbc" id="cancelBtn">Cancel</button>
      <button class="fbs" id="saveBtn">Save Project</button>
    </div>
  </div>
</div>

<!-- SETTINGS PAGE -->

<div class="fpage" id="settingsPage">
  <div class="phead">
    <button class="backbtn" onclick="closeSettings()">‹</button>
    <h2>Settings & Dropdowns</h2>
  </div>
  <div style="padding:16px">
    <div class="settings-item">
      <div class="fl" style="margin-bottom:8px">Project Statuses</div>
      <div id="projectStatusTags"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="fi" id="newProjectStatus" placeholder="Add status..." style="flex:1"/>
        <button class="fbs" style="flex:0;padding:10px 16px" onclick="addDropdownItem('projectStatuses','newProjectStatus','projectStatusTags',renderProjectStatusTags)">Add</button>
      </div>
    </div>
    <div class="settings-item">
      <div class="fl" style="margin-bottom:8px">Phase Types</div>
      <div id="phaseTypeTags"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="fi" id="newPhaseType" placeholder="Add phase..." style="flex:1"/>
        <button class="fbs" style="flex:0;padding:10px 16px" onclick="addDropdownItem('phaseTypes','newPhaseType','phaseTypeTags',renderPhaseTypeTags)">Add</button>
      </div>
    </div>
    <div class="settings-item">
      <div class="fl" style="margin-bottom:8px">Selection Statuses</div>
      <div id="choiceStatusTags"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="fi" id="newChoiceStatus" placeholder="Add status..." style="flex:1"/>
        <button class="fbs" style="flex:0;padding:10px 16px" onclick="addDropdownItem('choiceStatuses','newChoiceStatus','choiceStatusTags',renderChoiceStatusTags)">Add</button>
      </div>
    </div>
    <div class="settings-item">
      <div class="fl" style="margin-bottom:8px">Trade / Cost Categories</div>
      <div id="costCatTags"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="fi" id="newCostCat" placeholder="Add category..." style="flex:1"/>
        <button class="fbs" style="flex:0;padding:10px 16px" onclick="addDropdownItem('costCategories','newCostCat','costCatTags',renderCostCatTags)">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCnpDrdLOH_RhCFK9MSD--KWDy--vZmeao",
  authDomain:"spence-contracting.firebaseapp.com",
  projectId:"spence-contracting",
  storageBucket:"spence-contracting.firebasestorage.app",
  messagingSenderId:"696245066965",
  appId:"1:696245066965:web:de13db6e678f40cf5ed65c"
});
var db=firebase.firestore();
var col=db.collection("projects");
var settingsCol=db.collection("settings");

// Default dropdown values
var DEFAULTS={
  projectStatuses:["Planning","In Progress","On Hold","Completed"],
  phaseTypes:["Site Prep","Demo","Rough-In","Framing","Insulation","Drywall","MEP (Plumbing/Elec/HVAC)","Flooring","Tile Work","Cabinets & Millwork","Paint","Fixtures & Hardware","Punch List"],
  choiceStatuses:["Pending","Quoted","Ordered","Confirmed","In Stock","Delivered","Installed","Rejected"],
  costCategories:["Labor","Materials","Subcontractor","Equipment","Permits & Fees","Design","Contingency","Other"]
};
var dropdowns=JSON.parse(JSON.stringify(DEFAULTS));

var COLORS=["#E8713A","#3A78E8","#2EAA72","#9B6BE8","#E8B43A","#E83A6C"];
var SS={};
var projects=[],activeFilter="All",currentId=null,currentTab="timeline",selectedColor=0,editingId=null;

function buildSS(){
  SS={};
  var colors=["#E8713A","#3A78E8","#2EAA72","#999","#E8B43A","#9B6BE8"];
  dropdowns.projectStatuses.forEach(function(s,i){
    var c=colors[i%colors.length];
    SS[s]={bg:c+"22",text:c,dot:c};
  });
}

function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function fmt(d){if(!d)return"—";var p=d.split("-");return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1])-1]+" "+parseInt(p[2]);}
function daysLeft(e){return Math.ceil((new Date(e)-new Date())/86400000);}
function getProgress(p){if(!p.phases||!p.phases.length)return 0;var done=p.phases.filter(function(ph){return ph.complete==="Complete";}).length;return Math.round(done/p.phases.length*100);}
function getProject(){return projects.find(function(x){return x.id===currentId;});}

function setSyncStatus(s){
  var dot=document.getElementById("syncDot"),lbl=document.getElementById("syncLabel");
  if(s==="live"){dot.style.background="#2EAA72";lbl.textContent="Live sync on";}
  else if(s==="saving"){dot.style.background="#E8B43A";lbl.textContent="Saving...";}
  else if(s==="error"){dot.style.background="#E83A6C";lbl.textContent="Sync error";}
  else{dot.style.background="#aaa";lbl.textContent="Connecting...";}
}

// Load settings from Firebase
function loadSettings(cb){
  settingsCol.doc("dropdowns").get().then(function(doc){
    if(doc.exists){dropdowns=Object.assign({},DEFAULTS,doc.data());}
    buildSS();
    if(cb)cb();
  }).catch(function(){buildSS();if(cb)cb();});
}

function saveSettings(){
  settingsCol.doc("dropdowns").set(dropdowns).then(function(){showToast("✅ Settings saved!");});
}

// Sync projects
var SEED=[
  {id:"seed1",client:"Hargrove Residence",address:"4821 Maple Ridge Dr",type:"Kitchen Remodel",status:"In Progress",startDate:"2026-03-10",endDate:"2026-05-15",budget:48000,spent:22400,pm:"Danny Cruz",color:"#E86C3A",
   choices:[{category:"Cabinetry",item:"Shaker White Maple",vendor:"KraftMaid",status:"Ordered",notes:"Lead time 6 wks"}],
   phases:[{name:"Demo",start:"2026-03-10",end:"2026-03-14",complete:"Complete"},{name:"Rough-In",start:"2026-03-15",end:"2026-03-28",complete:"Complete"},{name:"Cabinets",start:"2026-04-01",end:"2026-04-18",complete:"In Progress"},{name:"Punch List",start:"2026-05-08",end:"2026-05-15",complete:"Not Started"}],
   notes:"Client wants weekly updates every Friday. Key contact: Sarah Hargrove 555-0182.",costs:[]},
  {id:"seed2",client:"Vega Commercial",address:"110 Commerce Blvd",type:"Office Build-Out",status:"Planning",startDate:"2026-05-01",endDate:"2026-07-30",budget:135000,spent:8200,pm:"Rena Okafor",color:"#3A78E8",choices:[],phases:[],notes:"Coordinate with building management.",costs:[]},
  {id:"seed3",client:"Thornfield Estate",address:"8 Crestview Lane",type:"Master Bath",status:"Completed",startDate:"2026-01-06",endDate:"2026-03-28",budget:62000,spent:59800,pm:"Danny Cruz",color:"#2EAA72",choices:[],phases:[],notes:"Final walkthrough completed 3/28.",costs:[]}
];

function startSync(){
  col.orderBy("client").onSnapshot(function(snap){
    if(snap.empty){
      var b=db.batch();
      SEED.forEach(function(p){b.set(col.doc(p.id),p);});
      b.commit();return;
    }
    projects=[];
    snap.forEach(function(d){projects.push(d.data());});
    setSyncStatus("live");
    renderAll();
    if(currentId&&document.getElementById("detailPage").classList.contains("show")){
      var p=getProject();if(p){renderTabs(p);renderTabBody(p);}
    }
  },function(){setSyncStatus("error");});
}

function saveP(p){
  setSyncStatus("saving");
  return col.doc(p.id).set(p).then(function(){showToast("✅ Saved!");}).catch(function(){showToast("❌ Error");});
}

// Render main
function renderAll(){renderStats();renderFilters();renderCards();}

function renderStats(){
  var total=projects.length,active=projects.filter(function(p){return p.status==="In Progress";}).length;
  var budget=projects.reduce(function(a,p){return a+(p.budget||0);},0),spent=projects.reduce(function(a,p){return a+(p.spent||0);},0);
  document.getElementById("stats").innerHTML=[["📁","Jobs",total],["⚡","Active",active],["💰","Budget","$"+(budget/1000).toFixed(0)+"k"],["📊","Spent","$"+(spent/1000).toFixed(0)+"k"]].map(function(d){return'<div class="scard"><div class="si">'+d[0]+'</div><div class="sv">'+d[2]+'</div><div class="sl">'+d[1]+'</div></div>';}).join("");
}

function renderFilters(){
  document.getElementById("filters").innerHTML=["All"].concat(dropdowns.projectStatuses).map(function(s){return'<button class="fb'+(s===activeFilter?" on":"")+'" data-f="'+s+'">'+s+'</button>';}).join("");
  document.querySelectorAll(".fb").forEach(function(b){b.onclick=function(){activeFilter=this.getAttribute("data-f");renderFilters();renderCards();};});
}

function renderCards(){
  var search=document.getElementById("searchInput").value.toLowerCase();
  var filtered=projects.filter(function(p){return(activeFilter==="All"||p.status===activeFilter)&&(!search||(p.client||"").toLowerCase().includes(search)||(p.type||"").toLowerCase().includes(search));});
  var el=document.getElementById("cards");
  if(!filtered.length){el.innerHTML='<div class="empty">No projects found.<br>Tap <strong>+ New</strong> to add one.</div>';return;}
  el.innerHTML=filtered.map(function(p){
    var sc=SS[p.status]||{bg:"#F5F5F5",text:"#666",dot:"#999"};
    var pct=Math.round((p.spent||0)/((p.budget||1))*100),pr=getProgress(p);
    var days=daysLeft(p.endDate),dc=p.status!=="Completed"&&days<14?"#C4511A":"#333";
    var dt=p.status!=="Completed"?" ("+(days>0?days+"d left":"Overdue")+")":"";
    return'<div class="card" data-id="'+p.id+'">'
      +'<div class="card-top"><div><div class="card-name">'+p.client+'</div><div class="card-sub">'+p.type+' · '+(p.address||"")+'</div></div>'
      +'<span class="badge" style="background:'+sc.bg+';color:'+sc.text+'"><span class="bdot" style="background:'+sc.dot+'"></span>'+p.status+'</span></div>'
      +'<div class="meta"><div><div class="ml">PM</div><div class="mv">'+(p.pm||"—")+'</div></div>'
      +'<div><div class="ml">Deadline</div><div class="mv" style="color:'+dc+'">'+fmt(p.endDate)+dt+'</div></div>'
      +'<div><div class="ml">Budget</div><div class="mv">$'+(p.budget||0).toLocaleString()+'</div></div></div>'
      +'<div class="brow"><div class="blr"><span>Phase Progress</span><span>'+pr+'%</span></div><div class="bt"><div class="bf" style="width:'+pr+'%;background:'+(p.color||"#E8713A")+'"></div></div></div>'
      +'<div class="brow"><div class="blr"><span>Budget Used</span><span>'+pct+'%</span></div><div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:'+(pct>90?"#E8713A":"#2EAA72")+'"></div></div></div>'
      +'</div>';
  }).join("");
  document.querySelectorAll(".card").forEach(function(c){c.onclick=function(){openDetail(this.getAttribute("data-id"));};});
}

// Detail
function openDetail(id){
  currentId=id;currentTab="timeline";
  var p=getProject();if(!p)return;
  var sc=SS[p.status]||{bg:"#F5F5F5",text:"#666"};
  document.getElementById("dName").textContent=p.client;
  var b=document.getElementById("dBadge");b.textContent=p.status;b.style.background=sc.bg;b.style.color=sc.text;
  renderTabs(p);renderTabBody(p);
  document.getElementById("detailPage").classList.add("show");
  document.getElementById("detailPage").scrollTop=0;
}

function renderTabs(p){
  document.getElementById("tabs").innerHTML=["Timeline","Choices","Budget","Notes"].map(function(t){
    var key=t.toLowerCase(),on=key===currentTab;
    return'<button class="ptab'+(on?" on":"")+'" style="'+(on?"border-bottom-color:"+(p.color||"#E8713A")+";color:#1A1A2E":"")+'" data-tab="'+key+'">'+t+'</button>';
  }).join("");

// Wire up phase name custom toggle

var sel=document.getElementById(“pNameSelect”);

}
}

function getChoiceColor(s){
var map={Confirmed:”#2EAA72”,Installed:”#2EAA72”,Delivered:”#2EAA72”,“In Stock”:”#3A78E8”,Ordered:”#3A78E8”,Pending:”#E8B43A”,Quoted:”#9B6BE8”,Rejected:”#E83A6C”};
return map[s]||”#999”;
}

function toggleForm(id){
var el=document.getElementById(id);
if(el)el.style.display=el.style.display===“none”?“block”:“none”;
}

// Phase actions
function addPhase(){
var sel=document.getElementById(“pNameSelect”);
var name=sel.value===”**custom**”?document.getElementById(“pNameCustom”).value.trim():sel.value;
if(!name){alert(“Please enter a phase name.”);return;}
var p=getProject();p.phases=p.phases||[];
p.phases.push({name:name,start:document.getElementById(“pStart”).value,end:document.getElementById(“pEnd”).value,complete:“Not Started”});
saveP(p);
}
function deletePhase(i){if(!confirm(“Delete this phase?”))return;var p=getProject();p.phases.splice(i,1);saveP(p);}
function updatePhaseStatus(i,val){var p=getProject();p.phases[i].complete=val;saveP(p);}

// Choice actions
function addChoice(){
var cat=document.getElementById(“cCat”).value.trim(),item=document.getElementById(“cItem”).value.trim();
if(!cat||!item){alert(“Please enter a category and item.”);return;}
var p=getProject();p.choices=p.choices||[];
p.choices.push({category:cat,item:item,vendor:document.getElementById(“cVendor”).value.trim(),notes:document.getElementById(“cNotes”).value.trim(),status:document.getElementById(“cStatus”).value});
saveP(p);
}
function deleteChoice(i){if(!confirm(“Delete this selection?”))return;var p=getProject();p.choices.splice(i,1);saveP(p);}
function updateChoiceStatus(i,val){var p=getProject();p.choices[i].status=val;saveP(p);}

// Cost actions
function addCost(){
var amt=parseFloat(document.getElementById(“costAmt”).value)||0;
var p=getProject();p.costs=p.costs||[];
p.costs.push({category:document.getElementById(“costCat”).value,description:document.getElementById(“costDesc”).value.trim(),amount:amt});
p.spent=(p.costs.reduce(function(a,c){return a+(c.amount||0);},0));
saveP(p);
}
function deleteCost(i){if(!confirm(“Delete this cost?”))return;var p=getProject();p.costs.splice(i,1);p.spent=p.costs.reduce(function(a,c){return a+(c.amount||0);},0);saveP(p);}
function saveBudget(){var p=getProject();p.budget=parseFloat(document.getElementById(“bBudget”).value)||0;p.spent=parseFloat(document.getElementById(“bSpent”).value)||0;saveP(p);}

// Notes
function saveNotes(){var p=getProject();p.notes=document.getElementById(“notesInput”).value;saveP(p);}

// Delete project
function deleteProject(){
if(!confirm(“Delete this project? Cannot be undone.”))return;
col.doc(currentId).delete().then(function(){document.getElementById(“detailPage”).classList.remove(“show”);showToast(“Deleted”);});
}

// Add/Edit project form
function renderColorPicker(){
document.getElementById(“cpick”).innerHTML=COLORS.map(function(c,i){return’<div class=“cdot” style=“background:’+c+’;border-color:’+(i===selectedColor?”#1A1A2E”:“transparent”)+’” data-ci=”’+i+’”></div>’;}).join(””);
document.querySelectorAll(”.cdot”).forEach(function(d){d.onclick=function(){selectedColor=parseInt(this.getAttribute(“data-ci”));renderColorPicker();};});
}
function populateStatusDropdown(){
var sel=document.getElementById(“fStatus”);
sel.innerHTML=dropdowns.projectStatuses.map(function(s){return’<option>’+s+’</option>’;}).join(””);
}
function openAdd(){
editingId=null;
document.getElementById(“addPageTitle”).textContent=“New Project”;
[“fClient”,“fType”,“fAddress”,“fPm”,“fStart”,“fEnd”,“fBudget”,“fSpent”,“fNotes”].forEach(function(id){document.getElementById(id).value=””;});
populateStatusDropdown();
selectedColor=0;renderColorPicker();
document.getElementById(“addPage”).classList.add(“show”);
document.getElementById(“addPage”).scrollTop=0;
}
function openEditProject(){
var p=getProject();editingId=p.id;
document.getElementById(“addPageTitle”).textContent=“Edit Project”;
document.getElementById(“fClient”).value=p.client||””;
document.getElementById(“fType”).value=p.type||””;
document.getElementById(“fAddress”).value=p.address||””;
document.getElementById(“fPm”).value=p.pm||””;
document.getElementById(“fStart”).value=p.startDate||””;
document.getElementById(“fEnd”).value=p.endDate||””;
document.getElementById(“fBudget”).value=p.budget||””;
document.getElementById(“fSpent”).value=p.spent||””;
document.getElementById(“fNotes”).value=p.notes||””;
populateStatusDropdown();
document.getElementById(“fStatus”).value=p.status||dropdowns.projectStatuses[0];
selectedColor=Math.max(0,COLORS.indexOf(p.color));
renderColorPicker();
document.getElementById(“addPage”).classList.add(“show”);
document.getElementById(“addPage”).scrollTop=0;
}
function saveProject(){
var client=document.getElementById(“fClient”).value.trim(),type=document.getElementById(“fType”).value.trim();
if(!client||!type){alert(“Please enter a client name and project type.”);return;}
var id=editingId||(“proj_”+Date.now());
var existing=editingId?(getProject()||{}):{};
var p=Object.assign({},existing,{
id:id,client:client,type:type,
address:document.getElementById(“fAddress”).value.trim(),
pm:document.getElementById(“fPm”).value.trim(),
startDate:document.getElementById(“fStart”).value,
endDate:document.getElementById(“fEnd”).value,
budget:parseFloat(document.getElementById(“fBudget”).value)||0,
spent:parseFloat(document.getElementById(“fSpent”).value)||0,
status:document.getElementById(“fStatus”).value,
notes:document.getElementById(“fNotes”).value.trim(),
color:COLORS[selectedColor],
choices:existing.choices||[],
phases:existing.phases||[],
costs:existing.costs||[]
});
col.doc(id).set(p).then(function(){
showToast(editingId?“✅ Updated!”:“✅ Project added!”);
document.getElementById(“addPage”).classList.remove(“show”);
if(editingId){currentId=id;}
}).catch(function(){showToast(“❌ Error saving”);});
}

// Settings / dropdowns
function openSettings(){
renderProjectStatusTags();renderPhaseTypeTags();renderChoiceStatusTags();renderCostCatTags();
document.getElementById(“settingsPage”).classList.add(“show”);
}
function closeSettings(){document.getElementById(“settingsPage”).classList.remove(“show”);}

function renderTags(containerId,arr,key,renderFn){
document.getElementById(containerId).innerHTML=arr.map(function(s,i){
return’<span class="tag">’+s+’<button onclick="removeDropdownItem(\''+key+'\','+i+',\''+containerId+'\','+renderFn.name+')">×</button></span>’;
}).join(””);
}
function renderProjectStatusTags(){renderTags(“projectStatusTags”,dropdowns.projectStatuses,“projectStatuses”,renderProjectStatusTags);}
function renderPhaseTypeTags(){renderTags(“phaseTypeTags”,dropdowns.phaseTypes,“phaseTypes”,renderPhaseTypeTags);}
function renderChoiceStatusTags(){renderTags(“choiceStatusTags”,dropdowns.choiceStatuses,“choiceStatuses”,renderChoiceStatusTags);}
function renderCostCatTags(){renderTags(“costCatTags”,dropdowns.costCategories,“costCategories”,renderCostCatTags);}

function addDropdownItem(key,inputId,containerId,renderFn){
var val=document.getElementById(inputId).value.trim();
if(!val)return;
if(dropdowns[key].indexOf(val)>=0){alert(“Already exists.”);return;}
dropdowns[key].push(val);
document.getElementById(inputId).value=””;
renderFn();
saveSettings();
buildSS();
}
function removeDropdownItem(key,i,containerId,renderFn){
dropdowns[key].splice(i,1);
renderFn();
saveSettings();
buildSS();
}

// Wire up
document.getElementById(“btnNew”).onclick=openAdd;
document.getElementById(“backBtn”).onclick=function(){document.getElementById(“detailPage”).classList.remove(“show”);};
document.getElementById(“addBackBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“cancelBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“saveBtn”).onclick=saveProject;
document.getElementById(“searchInput”).oninput=renderCards;

// Init
loadSettings(function(){startSync();});
