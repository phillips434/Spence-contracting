<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spence Contracting – Project Manager</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;min-height:100vh}
.topbar{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
#btnNew{background:#E8713A;border:none;border-radius:9px;color:#fff;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer}
.sync-bar{background:#1e2d4a;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.5)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 12px 0}
.scard{background:#fff;border-radius:11px;padding:11px 10px;border:1px solid #E8EAED}
.scard .si{font-size:15px;margin-bottom:3px}
.scard .sv{font-size:17px;font-weight:700;color:#1A1A2E}
.scard .sl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.controls{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
#searchInput{width:100%;border:1.5px solid #E0E0E0;border-radius:9px;padding:9px 12px;font-size:14px;outline:none;background:#fff}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{border:1.5px solid #E0E0E0;background:#fff;color:#666;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.fb.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
#cards{padding:0 12px 80px;display:grid;gap:12px}
.card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #E8EAED;cursor:pointer}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-name{font-size:15px;font-weight:700;color:#1A1A2E;line-height:1.2}
.card-sub{font-size:11px;color:#888;margin-top:3px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.meta{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.ml{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:12px;font-weight:600;color:#333}
.brow{margin-bottom:7px}
.blr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#aaa}
.bt{background:#EEE;border-radius:5px;height:5px}
.bf{height:100%;border-radius:5px}
/* Pages */
.page{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:40;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.show{display:block}
.phead{background:#1A1A2E;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back{background:none;border:none;color:#E8713A;font-size:15px;font-weight:600;cursor:pointer;padding:4px 8px 4px 0;-webkit-appearance:none}
.phead h2{color:#fff;font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ptabs{display:flex;background:#fff;border-bottom:1px solid #F0F0F0;overflow-x:auto;position:sticky;top:54px;z-index:9}
.ptab{border:none;background:none;padding:12px 16px;font-size:13px;cursor:pointer;color:#999;border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:400}
.ptab.on{color:#1A1A2E;font-weight:700}
.pbody{padding:16px}
/* Form elements */
.fpage{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:60;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fpage.show{display:block}
.fg{display:grid;gap:10px;margin-bottom:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fl{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.fi{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;color:#333;background:#fff;-webkit-appearance:none}
.fbtns{display:flex;gap:10px}
.fbc{flex:1;padding:12px;border:1.5px solid #E0E0E0;border-radius:10px;background:#fff;font-size:14px;cursor:pointer;color:#666}
.fbs{flex:2;padding:12px;border:none;border-radius:10px;background:#1A1A2E;font-size:14px;cursor:pointer;color:#fff;font-weight:700}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
/* Detail tabs content */
.iboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ibox{background:#fff;border-radius:10px;padding:12px 14px}
.ibl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.ibv{font-size:15px;font-weight:700;color:#1A1A2E;margin-top:2px}
.phase-item{margin-bottom:10px;background:#fff;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px}
.phase-row{display:flex;justify-content:space-between;align-items:center}
.ptrack{background:#EEE;border-radius:5px;height:8px;overflow:hidden;flex:1;margin:0 10px}
.pfill{height:100%;border-radius:5px}
.add-btn{width:100%;padding:11px;border:1.5px dashed #CCC;border-radius:10px;background:#fff;color:#888;font-size:13px;cursor:pointer;margin-top:8px;text-align:center}
.choice-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px}
.choice-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cba{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.del-btn{background:none;border:none;color:#E83A6C;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.bboxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.bbox{background:#fff;border-radius:10px;padding:12px}
.bbl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.bbv{font-size:16px;font-weight:700;margin-top:4px}
.nbox{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.save-bar{position:sticky;bottom:0;background:#F4F5F7;padding:12px 16px;border-top:1px solid #E8EAED}
.save-bar button{width:100%;padding:13px;border:none;border-radius:12px;background:#2EAA72;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
</style>
</head>
<body>

<div id="mainView">
  <div class="topbar">
    <h1>🏗️ Spence Contracting</h1>
    <button id="btnNew">+ New</button>
  </div>
  <div class="sync-bar">
    <div><span class="sync-dot" id="syncDot" style="background:#aaa"></span><span id="syncLabel">Connecting...</span></div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="fi" id="searchInput" placeholder="Search by client or job type..." type="search"/>
    <div class="filters" id="filters"></div>
  </div>
  <div id="cards"><div class="empty">Loading projects...</div></div>
</div>

<!-- DETAIL PAGE -->

<div class="page" id="detailPage">
  <div class="phead">
    <button class="back" id="backBtn">← Back</button>
    <h2 id="dName"></h2>
    <span class="pbadge" id="dBadge"></span>
  </div>
  <div class="ptabs" id="tabs"></div>
  <div class="pbody" id="tabBody"></div>
</div>

<!-- ADD/EDIT PROJECT PAGE -->

<div class="fpage" id="addPage">
  <div class="phead">
    <button class="back" id="addBackBtn">← Back</button>
    <h2 id="addPageTitle">New Project</h2>
  </div>
  <div style="padding:16px">
    <div class="fg">
      <div><div class="fl">Client Name *</div><input class="fi" id="fClient" placeholder="e.g. Johnson Residence"/></div>
      <div><div class="fl">Project Type *</div><input class="fi" id="fType" placeholder="e.g. Kitchen Remodel"/></div>
      <div><div class="fl">Address</div><input class="fi" id="fAddress" placeholder="123 Main St"/></div>
      <div><div class="fl">Project Manager</div><input class="fi" id="fPm" placeholder="Name"/></div>
      <div class="fr2">
        <div><div class="fl">Start Date</div><input class="fi" id="fStart" type="date"/></div>
        <div><div class="fl">End Date</div><input class="fi" id="fEnd" type="date"/></div>
      </div>
      <div><div class="fl">Budget ($)</div><input class="fi" id="fBudget" type="number" placeholder="50000"/></div>
      <div><div class="fl">Amount Spent ($)</div><input class="fi" id="fSpent" type="number" placeholder="0"/></div>
      <div><div class="fl">Status</div>
        <select class="fi" id="fStatus"><option>Planning</option><option>In Progress</option><option>On Hold</option><option>Completed</option></select>
      </div>
      <div><div class="fl">Notes</div><textarea class="fi" id="fNotes" rows="4" placeholder="Key contacts, special instructions..."></textarea></div>
      <div><div class="fl">Project Color</div><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="fbtns">
      <button class="fbc" id="cancelBtn">Cancel</button>
      <button class="fbs" id="saveBtn">Save Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCnpDrdLOH_RhCFK9MSD--KWDy--vZmeao",
  authDomain:"spence-contracting.firebaseapp.com",
  projectId:"spence-contracting",
  storageBucket:"spence-contracting.firebasestorage.app",
  messagingSenderId:"696245066965",
  appId:"1:696245066965:web:de13db6e678f40cf5ed65c"
});
var db=firebase.firestore();
var col=db.collection("projects");

var COLORS=["#E8713A","#3A78E8","#2EAA72","#9B6BE8","#E8B43A","#E83A6C"];
var SS={"In Progress":{bg:"#FFF3EC",text:"#C4511A",dot:"#E8713A"},"Planning":{bg:"#EEF4FF",text:"#2855B8",dot:"#3A78E8"},"Completed":{bg:"#EDFAF4",text:"#1A7A4E",dot:"#2EAA72"},"On Hold":{bg:"#F5F5F5",text:"#666",dot:"#999"}};
var CC={Confirmed:"#2EAA72",Ordered:"#3A78E8",Delivered:"#2EAA72",Installed:"#2EAA72","In Stock":"#3A78E8",Pending:"#E8B43A",Quoted:"#9B6BE8"};
var STATUSES=["Pending","Ordered","Confirmed","Delivered","In Stock","Installed","Quoted"];

var projects=[],activeFilter="All",currentId=null,currentTab="timeline",selectedColor=0,editingId=null;

var SEED=[
  {id:"seed1",client:"Hargrove Residence",address:"4821 Maple Ridge Dr",type:"Kitchen Remodel",status:"In Progress",startDate:"2026-03-10",endDate:"2026-05-15",budget:48000,spent:22400,pm:"Danny Cruz",color:"#E86C3A",
   choices:[{category:"Cabinetry",item:"Shaker White Maple",vendor:"KraftMaid",status:"Ordered",notes:"Lead time 6 wks"},{category:"Countertops",item:"Calacatta Gold Quartz",vendor:"MSI Surfaces",status:"Confirmed",notes:"Template Apr 20"}],
   phases:[{name:"Demo",start:"2026-03-10",end:"2026-03-14",complete:100},{name:"Rough-In",start:"2026-03-15",end:"2026-03-28",complete:100},{name:"Cabinets",start:"2026-04-01",end:"2026-04-18",complete:60},{name:"Countertops",start:"2026-04-21",end:"2026-04-28",complete:0}],
   notes:"Client wants weekly updates every Friday. Key contact: Sarah Hargrove 555-0182."},
  {id:"seed2",client:"Vega Commercial",address:"110 Commerce Blvd, Suite 3",type:"Office Build-Out",status:"Planning",startDate:"2026-05-01",endDate:"2026-07-30",budget:135000,spent:8200,pm:"Rena Okafor",color:"#3A78E8",choices:[],phases:[],notes:"Coordinate with building management for freight elevator access."},
  {id:"seed3",client:"Thornfield Estate",address:"8 Crestview Lane",type:"Master Bath Addition",status:"Completed",startDate:"2026-01-06",endDate:"2026-03-28",budget:62000,spent:59800,pm:"Danny Cruz",color:"#2EAA72",choices:[],phases:[],notes:"Final walkthrough completed 3/28. Client signed off."}
];

function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function fmt(d){if(!d)return"—";var p=d.split("-");return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1])-1]+" "+parseInt(p[2]);}
function daysLeft(e){return Math.ceil((new Date(e)-new Date())/86400000);}
function getProgress(p){if(!p.phases||!p.phases.length)return 0;return Math.round(p.phases.reduce(function(a,ph){return a+(ph.complete||0);},0)/p.phases.length);}
function getProject(){return projects.find(function(x){return x.id===currentId;});}

function setSyncStatus(s){
  var dot=document.getElementById("syncDot"),lbl=document.getElementById("syncLabel");
  if(s==="live"){dot.style.background="#2EAA72";lbl.textContent="Live sync on";}
  else if(s==="saving"){dot.style.background="#E8B43A";lbl.textContent="Saving...";}
  else if(s==="error"){dot.style.background="#E83A6C";lbl.textContent="Sync error";}
  else{dot.style.background="#aaa";lbl.textContent="Connecting...";}
}

function startSync(){
  col.orderBy("client").onSnapshot(function(snap){
    if(snap.empty){
      var b=db.batch();
      SEED.forEach(function(p){b.set(col.doc(p.id),p);});
      b.commit();return;
    }
    projects=[];
    snap.forEach(function(d){projects.push(d.data());});
    setSyncStatus("live");
    renderAll();
    if(currentId){
      var p=getProject();
      if(p&&document.getElementById("detailPage").classList.contains("show")){
        renderTabBody(p);
      }
    }
  },function(){setSyncStatus("error");});
}

function saveProjectToFirebase(p){
  setSyncStatus("saving");
  return col.doc(p.id).set(p).then(function(){showToast("✅ Saved!");}).catch(function(){setSyncStatus("error");showToast("❌ Error saving");});
}

function renderAll(){renderStats();renderFilters();renderCards();}

function renderStats(){
  var total=projects.length,active=projects.filter(function(p){return p.status==="In Progress";}).length;
  var budget=projects.reduce(function(a,p){return a+(p.budget||0);},0),spent=projects.reduce(function(a,p){return a+(p.spent||0);},0);
  document.getElementById("stats").innerHTML=[["📁","Jobs",total],["⚡","Active",active],["💰","Budget","$"+(budget/1000).toFixed(0)+"k"],["📊","Spent","$"+(spent/1000).toFixed(0)+"k"]].map(function(d){return'<div class="scard"><div class="si">'+d[0]+'</div><div class="sv">'+d[2]+'</div><div class="sl">'+d[1]+'</div></div>';}).join("");
}

function renderFilters(){
  document.getElementById("filters").innerHTML=["All","Planning","In Progress","On Hold","Completed"].map(function(s){return'<button class="fb'+(s===activeFilter?" on":"")+'" data-f="'+s+'">'+s+'</button>';}).join("");
  document.querySelectorAll(".fb").forEach(function(b){b.onclick=function(){activeFilter=this.getAttribute("data-f");renderFilters();renderCards();};});
}

function renderCards(){
  var search=document.getElementById("searchInput").value.toLowerCase();
  var filtered=projects.filter(function(p){return(activeFilter==="All"||p.status===activeFilter)&&(!search||(p.client||"").toLowerCase().includes(search)||(p.type||"").toLowerCase().includes(search));});
  var el=document.getElementById("cards");
  if(!filtered.length){el.innerHTML='<div class="empty">No projects found.<br>Tap <strong>+ New</strong> to add one.</div>';return;}
  el.innerHTML=filtered.map(function(p){
    var sc=SS[p.status]||SS["On Hold"],pct=Math.round((p.spent||0)/((p.budget||1))*100),pr=getProgress(p);
    var days=daysLeft(p.endDate),dc=p.status!=="Completed"&&days<14?"#C4511A":"#333";
    var dt=p.status!=="Completed"?" ("+(days>0?days+"d left":"Overdue")+")":"";
    return'<div class="card" data-id="'+p.id+'">'
      +'<div class="card-top"><div><div class="card-name">'+p.client+'</div><div class="card-sub">'+p.type+' · '+(p.address||"")+'</div></div>'
      +'<span class="badge" style="background:'+sc.bg+';color:'+sc.text+'"><span class="dot" style="background:'+sc.dot+'"></span>'+p.status+'</span></div>'
      +'<div class="meta"><div><div class="ml">PM</div><div class="mv">'+(p.pm||"—")+'</div></div>'
      +'<div><div class="ml">Deadline</div><div class="mv" style="color:'+dc+'">'+fmt(p.endDate)+dt+'</div></div>'
      +'<div><div class="ml">Budget</div><div class="mv">$'+(p.budget||0).toLocaleString()+'</div></div></div>'
      +'<div class="brow"><div class="blr"><span>Progress</span><span>'+pr+'%</span></div><div class="bt"><div class="bf" style="width:'+pr+'%;background:'+(p.color||"#E8713A")+'"></div></div></div>'
      +'<div class="brow"><div class="blr"><span>Budget Used</span><span>'+pct+'%</span></div><div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:'+(pct>90?"#E8713A":"#2EAA72")+'"></div></div></div>'
      +'</div>';
  }).join("");
  document.querySelectorAll(".card").forEach(function(c){c.onclick=function(){openDetail(this.getAttribute("data-id"));};});
}

function openDetail(id){
  currentId=id;currentTab="timeline";
  var p=getProject();if(!p)return;
  var sc=SS[p.status]||SS["On Hold"];
  document.getElementById("dName").textContent=p.client;
  var b=document.getElementById("dBadge");b.textContent=p.status;b.style.background=sc.bg;b.style.color=sc.text;
  renderTabs(p);renderTabBody(p);
  document.getElementById("detailPage").classList.add("show");
}

function renderTabs(p){
  document.getElementById("tabs").innerHTML=["timeline","choices","budget","notes"].map(function(t){
    var on=t===currentTab;
    return'<button class="ptab'+(on?" on":"")+'" style="'+(on?"border-bottom-color:"+(p.color||"#E8713A")+";color:#1A1A2E":"")+'" data-tab="'+t+'">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';
  }).join("");
  document.querySelectorAll(".ptab").forEach(function(b){b.onclick=function(){currentTab=this.getAttribute("data-tab");var p2=getProject();renderTabs(p2);renderTabBody(p2);};});
}

function renderTabBody(p){
  var html="";
  if(currentTab==="timeline"){
    html='<div class="iboxes"><div class="ibox"><div class="ibl">Start</div><div class="ibv">'+fmt(p.startDate)+'</div></div><div class="ibox"><div class="ibl">Completion</div><div class="ibv">'+fmt(p.endDate)+'</div></div></div>';
    html+='<div class="section-label">Phases</div>';
    (p.phases||[]).forEach(function(ph,i){
      var c=ph.complete||0,clr=c===100?"#2EAA72":c>0?"#E8713A":"#CBD5E1";
      html+='<div class="phase-item">'
        +'<div class="phase-row"><span style="font-size:13px;font-weight:600;color:#333;flex:1">'+ph.name+'</span>'
        +'<button class="del-btn" onclick="deletePhase('+i+')">×</button></div>'
        +'<div style="font-size:10px;color:#999">'+fmt(ph.start)+' → '+fmt(ph.end)+'</div>'
        +'<div class="phase-row"><span style="font-size:11px;color:#aaa">'+c+'%</span><div class="ptrack"><div class="pfill" style="width:'+c+'%;background:'+clr+'"></div></div>'
        +'<input type="range" min="0" max="100" value="'+c+'" style="width:70px" data-pi="'+i+'" onchange="updatePhaseProgress('+i+',this.value)"/></div>'
        +'</div>';
    });
    html+='<button class="add-btn" onclick="showAddPhase()">+ Add Phase</button>';
    html+='<div id="addPhaseForm" style="display:none;background:#fff;border-radius:12px;padding:14px;margin-top:10px">'
      +'<div class="fl">Phase Name</div><input class="fi" id="pName" placeholder="e.g. Demo" style="margin-bottom:8px"/>'
      +'<div class="fr2"><div><div class="fl">Start</div><input class="fi" id="pStart" type="date"/></div><div><div class="fl">End</div><input class="fi" id="pEnd" type="date"/></div></div>'
      +'<div style="display:flex;gap:8px;margin-top:10px"><button class="fbc" onclick="hideAddPhase()">Cancel</button><button class="fbs" onclick="addPhase()">Add</button></div>'
      +'</div>';
  } else if(currentTab==="choices"){
    html='<div class="section-label">Client Selections</div>';
    (p.choices||[]).forEach(function(ch,i){
      var cc=CC[ch.status]||"#999";
      html+='<div class="choice-item">'
        +'<div class="choice-row"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#333">'+ch.category+'</div>'
        +'<div style="font-size:12px;color:#555;margin-top:2px">'+ch.item+'</div>'
        +'<div style="font-size:11px;color:#aaa;margin-top:1px">'+ch.vendor+'</div></div>'
        +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'
        +'<button class="del-btn" onclick="deleteChoice('+i+')">×</button>'
        +'<span class="cba" style="background:'+cc+'22;color:'+cc+'">'+ch.status+'</span></div></div>'
        +(ch.notes?'<div style="font-size:11px;color:#aaa;margin-top:6px">'+ch.notes+'</div>':'')
        +'<select class="fi" style="margin-top:8px;font-size:12px;padding:6px" onchange="updateChoiceStatus('+i+',this.value)">'
        +STATUSES.map(function(s){return'<option'+(s===ch.status?" selected":"")+'>'+s+'</option>';}).join("")
        +'</select>'
        +'</div>';
    });
    html+='<button class="add-btn" onclick="showAddChoice()">+ Add Selection</button>';
    html+='<div id="addChoiceForm" style="display:none;background:#fff;border-radius:12px;padding:14px;margin-top:10px">'
      +'<div class="fl">Category</div><input class="fi" id="cCat" placeholder="e.g. Flooring" style="margin-bottom:8px"/>'
      +'<div class="fl">Item / Description</div><input class="fi" id="cItem" placeholder="e.g. 12x24 Porcelain" style="margin-bottom:8px"/>'
      +'<div class="fl">Vendor</div><input class="fi" id="cVendor" placeholder="e.g. Floor & Decor" style="margin-bottom:8px"/>'
      +'<div class="fl">Notes</div><input class="fi" id="cNotes" placeholder="Optional" style="margin-bottom:8px"/>'
      +'<div class="fl">Status</div><select class="fi" id="cStatus" style="margin-bottom:10px">'+STATUSES.map(function(s){return'<option>'+s+'</option>';}).join("")+'</select>'
      +'<div style="display:flex;gap:8px"><button class="fbc" onclick="hideAddChoice()">Cancel</button><button class="fbs" onclick="addChoice()">Add</button></div>'
      +'</div>';
  } else if(currentTab==="budget"){
    var rem=(p.budget||0)-(p.spent||0),pct=p.budget>0?Math.round((p.spent||0)/p.budget*100):0,bc=pct>90?"#E8713A":"#2EAA72";
    html='<div class="bboxes"><div class="bbox"><div class="bbl">Budget</div><div class="bbv" style="color:#1A1A2E">$'+(p.budget||0).toLocaleString()+'</div></div>'
      +'<div class="bbox"><div class="bbl">Spent</div><div class="bbv" style="color:#E8713A">$'+(p.spent||0).toLocaleString()+'</div></div>'
      +'<div class="bbox"><div class="bbl">Remaining</div><div class="bbv" style="color:#2EAA72">$'+rem.toLocaleString()+'</div></div></div>'
      +'<div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px"><span style="font-weight:600">Utilization</span><span>'+pct+'%</span></div>'
      +'<div style="background:#E0E0E0;border-radius:8px;height:12px"><div style="height:100%;width:'+Math.min(100,pct)+'%;background:'+bc+';border-radius:8px"></div></div></div>'
      +'<div class="nbox"><div class="fl" style="margin-bottom:8px">Update Budget</div>'
      +'<div class="fr2"><div><div class="fl">Total Budget ($)</div><input class="fi" id="bBudget" type="number" value="'+(p.budget||0)+'"/></div>'
      +'<div><div class="fl">Amount Spent ($)</div><input class="fi" id="bSpent" type="number" value="'+(p.spent||0)+'"/></div></div>'
      +'<button class="fbs" style="width:100%;margin-top:10px" onclick="saveBudget()">Update Budget</button></div>';
  } else {
    html='<div class="nbox"><div class="fl" style="margin-bottom:8px">Project Notes</div>'
      +'<textarea class="fi" id="notesInput" rows="8" style="margin-bottom:10px">'+(p.notes||"")+'</textarea>'

}
document.getElementById(“tabBody”).innerHTML=html;
}

// Phase functions
function showAddPhase(){document.getElementById(“addPhaseForm”).style.display=“block”;}
function hideAddPhase(){document.getElementById(“addPhaseForm”).style.display=“none”;}
function addPhase(){
var name=document.getElementById(“pName”).value.trim();
if(!name){alert(“Please enter a phase name.”);return;}
var p=getProject();
p.phases=p.phases||[];
p.phases.push({name:name,start:document.getElementById(“pStart”).value,end:document.getElementById(“pEnd”).value,complete:0});
saveProjectToFirebase(p);
}
function deletePhase(i){
if(!confirm(“Delete this phase?”))return;
var p=getProject();p.phases.splice(i,1);saveProjectToFirebase(p);
}
function updatePhaseProgress(i,val){
var p=getProject();p.phases[i].complete=parseInt(val);saveProjectToFirebase(p);
}

// Choice functions
function showAddChoice(){document.getElementById(“addChoiceForm”).style.display=“block”;}
function hideAddChoice(){document.getElementById(“addChoiceForm”).style.display=“none”;}
function addChoice(){
var cat=document.getElementById(“cCat”).value.trim(),item=document.getElementById(“cItem”).value.trim();
if(!cat||!item){alert(“Please enter a category and item.”);return;}
var p=getProject();
p.choices=p.choices||[];
p.choices.push({category:cat,item:item,vendor:document.getElementById(“cVendor”).value.trim(),notes:document.getElementById(“cNotes”).value.trim(),status:document.getElementById(“cStatus”).value});
saveProjectToFirebase(p);
}
function deleteChoice(i){
if(!confirm(“Delete this selection?”))return;
var p=getProject();p.choices.splice(i,1);saveProjectToFirebase(p);
}
function updateChoiceStatus(i,val){
var p=getProject();p.choices[i].status=val;saveProjectToFirebase(p);
}

// Budget
function saveBudget(){
var p=getProject();
p.budget=parseFloat(document.getElementById(“bBudget”).value)||0;
p.spent=parseFloat(document.getElementById(“bSpent”).value)||0;
saveProjectToFirebase(p);
}

// Notes
function saveNotes(){
var p=getProject();
p.notes=document.getElementById(“notesInput”).value;
saveProjectToFirebase(p);
}

// Delete project
function deleteProject(){
if(!confirm(“Delete this project? This cannot be undone.”))return;
col.doc(currentId).delete().then(function(){
document.getElementById(“detailPage”).classList.remove(“show”);
showToast(“Project deleted”);
});
}

// Edit project
function openEditProject(){
var p=getProject();
editingId=p.id;
document.getElementById(“addPageTitle”).textContent=“Edit Project”;
document.getElementById(“fClient”).value=p.client||””;
document.getElementById(“fType”).value=p.type||””;
document.getElementById(“fAddress”).value=p.address||””;
document.getElementById(“fPm”).value=p.pm||””;
document.getElementById(“fStart”).value=p.startDate||””;
document.getElementById(“fEnd”).value=p.endDate||””;
document.getElementById(“fBudget”).value=p.budget||””;
document.getElementById(“fSpent”).value=p.spent||””;
document.getElementById(“fStatus”).value=p.status||“Planning”;
document.getElementById(“fNotes”).value=p.notes||””;
selectedColor=COLORS.indexOf(p.color)||0;
renderColorPicker();
document.getElementById(“addPage”).classList.add(“show”);
}

function renderColorPicker(){
document.getElementById(“cpick”).innerHTML=COLORS.map(function(c,i){return’<div class=“cdot” style=“background:’+c+’;border-color:’+(i===selectedColor?”#1A1A2E”:“transparent”)+’” data-ci=”’+i+’”></div>’;}).join(””);
document.querySelectorAll(”.cdot”).forEach(function(d){d.onclick=function(){selectedColor=parseInt(this.getAttribute(“data-ci”));renderColorPicker();};});
}

function openAdd(){
editingId=null;
document.getElementById(“addPageTitle”).textContent=“New Project”;
[“fClient”,“fType”,“fAddress”,“fPm”,“fStart”,“fEnd”,“fBudget”,“fSpent”,“fNotes”].forEach(function(id){document.getElementById(id).value=””;});
document.getElementById(“fStatus”).value=“Planning”;
selectedColor=0;renderColorPicker();
document.getElementById(“addPage”).classList.add(“show”);
}

function saveProject(){
var client=document.getElementById(“fClient”).value.trim(),type=document.getElementById(“fType”).value.trim();
if(!client||!type){alert(“Please enter a client name and project type.”);return;}
var id=editingId||(“proj_”+Date.now());
var existing=editingId?getProject():{};
var p=Object.assign({},existing,{
id:id,client:client,type:type,
address:document.getElementById(“fAddress”).value.trim(),
pm:document.getElementById(“fPm”).value.trim(),
startDate:document.getElementById(“fStart”).value,
endDate:document.getElementById(“fEnd”).value,
budget:parseFloat(document.getElementById(“fBudget”).value)||0,
spent:parseFloat(document.getElementById(“fSpent”).value)||0,
status:document.getElementById(“fStatus”).value,
notes:document.getElementById(“fNotes”).value.trim(),
color:COLORS[selectedColor],
choices:existing.choices||[],
phases:existing.phases||[]
});
col.doc(id).set(p).then(function(){
showToast(editingId?“✅ Project updated!”:“✅ Project added!”);
document.getElementById(“addPage”).classList.remove(“show”);
if(editingId){currentId=id;var proj=getProject();if(proj){renderTabs(proj);renderTabBody(proj);}}
}).catch(function(){showToast(“❌ Error saving”);});
}

// Wire up
document.getElementById(“btnNew”).onclick=openAdd;
document.getElementById(“backBtn”).onclick=function(){document.getElementById(“detailPage”).classList.remove(“show”);};
document.getElementById(“addBackBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“cancelBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“saveBtn”).onclick=saveProject;
document.getElementById(“searchInput”).oninput=renderCards;

startSync();
</script>
