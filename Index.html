<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spence Contracting</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;min-height:100vh}
button,select,input,textarea{-webkit-appearance:none;font-family:inherit}
.topbar{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
.sync-bar{background:#162236;padding:5px 16px;display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.45);gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s}
.btn-orange{background:#E8713A;border:none;border-radius:9px;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-dark{background:#1A1A2E;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-green{background:#2EAA72;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-red{background:#E83A6C;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn-ghost{background:#fff;border:1.5px solid #E0E0E0;border-radius:10px;color:#666;padding:12px;font-size:14px;cursor:pointer;flex:1}
.btn-dashed{width:100%;padding:12px;border:1.5px dashed #CCC;border-radius:10px;background:#fff;color:#888;font-size:13px;cursor:pointer;margin-top:6px;text-align:center}
.btn-blue{background:#3A78E8;border:none;border-radius:8px;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-notify{background:#9B6BE8;border:none;border-radius:8px;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-sm{border:none;border-radius:8px;color:#fff;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-ai{background:linear-gradient(135deg,#9B6BE8,#3A78E8);border:none;border-radius:10px;color:#fff;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.back-btn{display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0;line-height:1}
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#F4F5F7;z-index:60;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.show{display:block}
.phead{background:#1A1A2E;padding:0 12px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:10;gap:8px}
.phead-title{color:#fff;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.ptabs{display:flex;background:#fff;border-bottom:1px solid #EBEBEB;overflow-x:auto;position:sticky;top:56px;z-index:9;-webkit-overflow-scrolling:touch}
.ptab{border:none;background:none;padding:14px 12px;font-size:12px;color:#aaa;border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;min-height:48px;cursor:pointer}
.ptab.on{color:#1A1A2E;font-weight:700}
.pbody{padding:14px 14px 100px}
.fpage{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#F4F5F7;z-index:70;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fpage.show{display:block}
.fi{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:11px 12px;font-size:14px;outline:none;color:#333;background:#fff}
.fl{font-size:10px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;display:block}
.fg{display:grid;gap:12px;margin-bottom:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fbtns{display:flex;gap:10px}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #EBEBEB;cursor:pointer;margin-bottom:12px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.brow{margin-bottom:8px}
.blr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#aaa}
.bt{background:#EEE;border-radius:5px;height:6px}
.bf{height:100%;border-radius:5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.scard{background:#fff;border-radius:11px;padding:11px 10px;border:1px solid #EBEBEB}
.scard .si{font-size:15px;margin-bottom:3px}
.scard .sv{font-size:17px;font-weight:700;color:#1A1A2E}
.scard .sl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.wcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:4px}
.item-card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;border:1px solid #F0F0F0}
.del-btn{background:none;border:none;color:#E83A6C;font-size:22px;padding:2px 6px;line-height:1;cursor:pointer;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bva-row{display:flex;gap:8px;margin-top:8px}
.bva-box{flex:1;background:#F8F8F8;border-radius:8px;padding:8px 10px}
.bva-label{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.bva-val{font-size:14px;font-weight:700}
.inline-form{background:#EEF2F7;border-radius:12px;padding:14px;margin-top:8px;border:1.5px solid #DDE3EC;display:none}
.iboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ibox{background:#fff;border-radius:10px;padding:12px 14px}
.ibl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.ibv{font-size:15px;font-weight:700;color:#1A1A2E;margin-top:2px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sbox{background:#fff;border-radius:10px;padding:12px}
.sbox-label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.sbox-val{font-size:16px;font-weight:700;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:6px;background:#EEF4FF;color:#2855B8;border-radius:20px;padding:5px 12px;font-size:13px;margin:3px}
.tag button{background:none;border:none;color:#E83A6C;font-size:17px;line-height:1;padding:0;cursor:pointer}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{border:1.5px solid #E0E0E0;background:#fff;color:#666;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.fb.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
.controls{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
#cards{padding:0 14px 80px}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.notif-banner{position:fixed;top:0;left:0;right:0;z-index:998;background:#2EAA72;color:#fff;padding:12px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;transform:translateY(-100%);transition:transform .4s;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.notif-banner.show{transform:translateY(0)}
.bell-btn{position:relative;background:rgba(255,255,255,0.15);border:none;border-radius:9px;color:#fff;padding:8px 10px;font-size:16px;cursor:pointer}
.bell-badge{position:absolute;top:-4px;right:-4px;background:#E83A6C;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.notif-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid #2EAA72}
.notif-item.unread{background:#F0FBF5}
.notif-time{font-size:10px;color:#aaa;margin-top:4px}
.punch-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #F0F0F0}
.punch-cb{width:22px;height:22px;border-radius:6px;border:2px solid #CCC;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.punch-cb.done{background:#2EAA72;border-color:#2EAA72;color:#fff}
.punch-text{flex:1;font-size:14px;color:#333}
.punch-text.done{text-decoration:line-through;color:#aaa}
.co-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.log-date{font-size:11px;color:#aaa;margin-bottom:4px}
.log-text{font-size:13px;color:#444;line-height:1.5}
.note-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #F0F0F0}
.note-ts{font-size:10px;color:#aaa;margin-top:4px}
.note-cb{width:20px;height:20px;border-radius:5px;border:2px solid #CCC;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.note-cb.done{background:#2EAA72;border-color:#2EAA72;color:#fff}
.view-toggle{display:flex;gap:6px;margin-bottom:14px}
.vt-btn{flex:1;padding:9px;border:1.5px solid #E0E0E0;border-radius:9px;background:#fff;font-size:12px;font-weight:600;color:#666;cursor:pointer}
.vt-btn.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
.gantt-wrap{overflow-x:auto;background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.gantt-row{display:flex;align-items:center;margin-bottom:8px;min-height:32px}
.gantt-label{width:110px;font-size:11px;font-weight:600;color:#333;flex-shrink:0;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;background:#F0F0F0;border-radius:20px;height:24px;position:relative;min-width:180px}
.gantt-bar{position:absolute;height:100%;border-radius:20px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;min-width:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:700;color:#1A1A2E}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#aaa;padding:4px 0}
.cal-day{min-height:52px;border-radius:8px;padding:4px;background:#fff;border:1px solid #F0F0F0;font-size:11px}
.cal-day.other-month{background:#F8F8F8;color:#ccc}
.cal-day.today{border-color:#E8713A;background:#FFF8F5}
.cal-day-num{font-weight:700;color:#333;margin-bottom:2px}
.cal-event{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;color:#fff;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:80;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#1A1A2E;margin-bottom:14px}
.sub-card{background:#F8F8F8;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #EBEBEB;display:flex;align-items:center;gap:10px}
.sub-type-badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700}
.main-nav{display:flex;background:#fff;border-bottom:2px solid #F0F0F0;position:sticky;top:56px;z-index:49}
.nav-tab{flex:1;padding:12px 8px;border:none;background:none;font-size:12px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:3px solid transparent}
.nav-tab.on{color:#1A1A2E;border-bottom-color:#E8713A}
.est-card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #EBEBEB;cursor:pointer;margin-bottom:12px}
.est-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.li-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #F5F5F5}
.li-name{flex:2;font-size:13px;color:#333;font-weight:600}
.li-total{font-size:13px;font-weight:700;color:#1A1A2E;text-align:right;white-space:nowrap}
.est-summary{background:#1A1A2E;border-radius:12px;padding:16px;margin-top:14px}
.est-sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:rgba(255,255,255,0.7)}
.est-sum-row.total{color:#fff;font-weight:700;font-size:16px;border-top:1px solid rgba(255,255,255,0.2);margin-top:6px;padding-top:12px}
.est-sum-row.profit{color:#2EAA72;font-weight:600}
.client-view{max-width:600px;margin:0 auto;padding:20px}
.client-header{background:#1A1A2E;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.sig-canvas{border:2px dashed #CCC;border-radius:10px;width:100%;height:160px;cursor:crosshair;touch-action:none;background:#FAFAFA}
/* AI */
.ai-box{background:linear-gradient(135deg,#1A1A2E,#2A1A4E);border-radius:14px;padding:16px;margin-bottom:14px}
.ai-title{color:#fff;font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.ai-sub{color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:12px}
.ai-input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:11px 12px;font-size:14px;color:#fff;outline:none;resize:none}
.ai-input::placeholder{color:rgba(255,255,255,0.35)}
.ai-loading{display:none;text-align:center;padding:20px;color:rgba(255,255,255,0.7);font-size:13px}
.ai-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* Line item table */
.li-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.li-table th{text-align:left;padding:6px 4px;font-size:9px;color:#aaa;text-transform:uppercase;border-bottom:2px solid #F0F0F0;font-weight:700}
.li-table td{padding:8px 4px;border-bottom:1px solid #F8F8F8;vertical-align:middle}
.li-edit-input{border:1px solid #E0E0E0;border-radius:6px;padding:4px 6px;font-size:12px;width:100%;background:#fff}
</style>
</head>
<body>

<div class="notif-banner" id="notifBanner">
  <span id="notifBannerText"></span>
  <button onclick="dismissBanner()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">×</button>
</div>

<div id="mainView">
  <div class="topbar">
    <h1>🏗️ Spence Contracting</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="bell-btn" onclick="openNotifications()">🔔<span class="bell-badge" id="bellBadge">0</span></button>
      <button class="btn-orange" style="background:rgba(255,255,255,0.15)" onclick="openSettings()">⚙️</button>
      <button class="btn-orange" id="btnNew">+ New</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sdot" id="syncDot"></div><span id="syncLabel">Connecting...</span></div>
  <div class="main-nav">
    <button class="nav-tab on" id="navProjects" onclick="switchMainTab('projects')">📁 Projects</button>
    <button class="nav-tab" id="navEstimates" onclick="switchMainTab('estimates')">📋 Estimates</button>
  </div>
  <div id="projectsView">
    <div class="stats" id="stats"></div>
    <div class="controls">
      <input class="fi" id="searchInput" placeholder="Search projects..." type="search"/>
      <div class="filters" id="filters"></div>
    </div>
    <div id="cards"><div class="empty">Loading...</div></div>
  </div>
  <div id="estimatesView" style="display:none;padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#1A1A2E">Estimates</div>
      <button class="btn-orange" onclick="openNewEstimate()">+ New Estimate</button>
    </div>
    <div id="estCards"><div class="empty">No estimates yet.</div></div>
  </div>
</div>

<!-- PROJECT DETAIL -->
<div class="page" id="detailPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('detailPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title" id="dName"></span>
    <span class="pbadge" id="dBadge"></span>
  </div>
  <div class="ptabs" id="tabs"></div>
  <div class="pbody" id="tabBody"></div>
</div>

<!-- ESTIMATE DETAIL -->
<div class="page" id="estDetailPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('estDetailPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title" id="edName"></span>
    <span class="pbadge" id="edBadge"></span>
  </div>
  <div class="pbody" id="estDetailBody"></div>
</div>

<!-- ADD/EDIT PROJECT -->
<div class="fpage" id="addPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('addPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>
    <span class="phead-title" id="addPageTitle">New Project</span>
  </div>
  <div style="padding:14px">
    <div class="fg">
      <div><label class="fl">Client Name *</label><input class="fi" id="fClient" placeholder="e.g. Johnson Residence"/></div>
      <div><label class="fl">Project Type *</label><input class="fi" id="fType" placeholder="e.g. Kitchen Remodel"/></div>
      <div><label class="fl">Address</label><input class="fi" id="fAddress" placeholder="123 Main St"/></div>
      <div><label class="fl">Project Manager</label><input class="fi" id="fPm" placeholder="Name"/></div>
      <div class="fr2">
        <div><label class="fl">Start Date</label><input class="fi" id="fStart" type="date"/></div>
        <div><label class="fl">End Date</label><input class="fi" id="fEnd" type="date"/></div>
      </div>
      <div class="fr2">
        <div><label class="fl">Budget ($)</label><input class="fi" id="fBudget" type="number" placeholder="0"/></div>
        <div><label class="fl">Spent ($)</label><input class="fi" id="fSpent" type="number" placeholder="0"/></div>
      </div>
      <div><label class="fl">Status</label><select class="fi" id="fStatus"></select></div>
      <div><label class="fl">Notes</label><textarea class="fi" id="fNotes" rows="3" placeholder="Key contacts, special instructions..."></textarea></div>
      <div><label class="fl">Color</label><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="fbtns">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-dark" style="flex:2" id="saveBtn">Save Project</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT ESTIMATE -->
<div class="fpage" id="estFormPage">
  <div class="phead">
    <a href="#" onclick="document.getElementById('estFormPage').classList.remove('show');return false;" style="display:inline-flex;align-items:center;justify-content:center;background:#E8713A;border:none;border-radius:8px;color:#fff;font-size:24px;font-weight:900;min-width:48px;min-height:48px;cursor:pointer;margin-right:10px;text-decoration:none;flex-shrink:0">‹</a>

// ESTIMATE CALCULATIONS — per line item markup
function calcLineItemTotal(li){
  var cost=parseFloat(li.total)||0;
  var markup=parseFloat(li.markup)||0;
  return cost*(1+markup/100);
}
function calcEstimate(est){
  var items=est.lineItems||[];
  var subtotal=items.reduce(function(a,li){return a+(parseFloat(li.total)||0);},0);
  var clientTotal=items.reduce(function(a,li){return a+calcLineItemTotal(li);},0);
  var tax=parseFloat(est.tax)||0;
  var taxAmt=clientTotal*(tax/100);
  var grandTotal=clientTotal+taxAmt;
  var profit=grandTotal-subtotal-taxAmt;
  var margin=grandTotal>0?(profit/grandTotal*100):0;
  return{subtotal:subtotal,clientTotal:clientTotal,taxAmt:taxAmt,grandTotal:grandTotal,profit:profit,margin:margin};
}

// AI ESTIMATE GENERATOR
async function generateAIEstimate(){
  var prompt=document.getElementById("aiPrompt").value.trim();
  if(!prompt){alert("Please describe the project first.");return;}
  var e=ger();if(!e)return;
  document.getElementById("aiLoading").style.display="block";
  document.querySelector(".btn-ai").disabled=true;
  var defaultMarkup=parseFloat(e.markup)||20;
  var systemPrompt="You are an expert construction estimator with 20 years of experience. Generate a detailed construction estimate based on the job description. Return ONLY valid JSON, no markdown, no explanation. Format: {\"lineItems\":[{\"category\":\"Labor\",\"desc\":\"Description of work\",\"qty\":1,\"unit\":\"hrs\",\"unitCost\":85,\"total\":85,\"markup\":20}]} Categories must be from: Labor, Materials, Subcontractor, Equipment, Permits & Fees, Other. Use realistic current market pricing for the described location. Include all necessary line items for the scope described. Default markup is "+defaultMarkup+"% but adjust per trade (labor typically higher, materials lower). Return 8-15 line items.";
  try{
    var response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:"user",content:"Generate a construction estimate for: "+prompt}]
      })
    });
    var data=await response.json();
    var text=data.content&&data.content[0]&&data.content[0].text||"";
    var clean=text.replace(/```json|```/g,"").trim();
    var parsed=JSON.parse(clean);
    if(parsed.lineItems&&parsed.lineItems.length){
      e.lineItems=(e.lineItems||[]).concat(parsed.lineItems);
      await eCol.doc(e.id).set(e);
      T("✅ "+parsed.lineItems.length+" line items added!");
      document.getElementById("aiPrompt").value="";
      renderEstDetailBody(e);
    } else {
      alert("AI couldn't generate items. Try a more specific description.");
    }
  }catch(err){
    console.error(err);
    alert("Error generating estimate. Please try again.");
  }finally{
    document.getElementById("aiLoading").style.display="none";
    document.querySelector(".btn-ai").disabled=false;
  }
}

function showForm(id){var el=document.getElementById(id);if(el)el.style.display="block";}
function hideForm(id){var el=document.getElementById(id);if(el)el.style.display="none";}
function addPhase(){var sel=document.getElementById("pSel"),name=sel.value==="__c__"?document.getElementById("pCustom").value.trim():sel.value;if(!name){alert("Enter a phase name.");return;}var p=gpr();p.phases=p.phases||[];var member=(DD.team||[]).find(function(m){return m.name===document.getElementById("pAssign").value;});p.phases.push({name:name,start:document.getElementById("pSt").value,end:document.getElementById("pEn").value,phaseBudget:parseFloat(document.getElementById("pBud").value)||0,phaseActual:parseFloat(document.getElementById("pAct").value)||0,complete:"Not Started",assignTo:document.getElementById("pAssign").value,assignPhone:member?member.phone||"":"",assignEmail:member?member.email||"":""});saveP(p,"Phase '"+name+"' added to "+p.client);}
function delPhase(i){if(!confirm("Delete phase?"))return;var p=gpr();p.phases.splice(i,1);saveP(p);}
function updatePhaseStatus(i,v){var p=gpr();var old=p.phases[i].complete;p.phases[i].complete=v;saveP(p,old!==v?"Phase '"+p.phases[i].name+"' is now "+v+" on "+p.client:null);}
function addChoice(){var cat=document.getElementById("cCat").value.trim(),item=document.getElementById("cItem").value.trim();if(!cat||!item){alert("Enter category and item.");return;}var p=gpr();p.choices=p.choices||[];p.choices.push({category:cat,item:item,vendor:document.getElementById("cVend").value.trim(),notes:document.getElementById("cNotes").value.trim(),status:document.getElementById("cStat").value,budgetAmt:parseFloat(document.getElementById("cBud").value)||0,actualAmt:parseFloat(document.getElementById("cAct").value)||0});saveP(p,"Selection '"+cat+"' added to "+p.client);}
function delChoice(i){if(!confirm("Delete?"))return;var p=gpr();p.choices.splice(i,1);saveP(p);}
function updateChoiceStatus(i,v){var p=gpr();var old=p.choices[i].status;p.choices[i].status=v;saveP(p,old!==v?"Selection '"+p.choices[i].category+"' is now "+v+" on "+p.client:null);}
function addCost(){var p=gpr();p.costs=p.costs||[];var b=parseFloat(document.getElementById("costB").value)||0,a=parseFloat(document.getElementById("costA").value)||0;p.costs.push({category:document.getElementById("costCat").value,description:document.getElementById("costDesc").value.trim(),budgetAmt:b,actualAmt:a});p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function delCost(i){if(!confirm("Delete?"))return;var p=gpr();p.costs.splice(i,1);p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function updateCostAmt(i,k,v){var p=gpr();p.costs[i][k]=parseFloat(v)||0;p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function saveBudgetTotals(){var p=gpr();p.budget=parseFloat(document.getElementById("bBud").value)||0;p.spent=parseFloat(document.getElementById("bSpt").value)||0;saveP(p);}
function addPunch(){var text=document.getElementById("plText").value.trim();if(!text){alert("Enter an item.");return;}var p=gpr();p.punchList=p.punchList||[];p.punchList.push({text:text,category:document.getElementById("plCat").value,done:false});saveP(p);}
function delPunch(i){if(!confirm("Delete?"))return;var p=gpr();p.punchList.splice(i,1);saveP(p);}
function togglePunch(i){var p=gpr();p.punchList[i].done=!p.punchList[i].done;saveP(p,p.punchList[i].done?"Punch list item completed on "+p.client:null);}
function addCO(){var title=document.getElementById("coTitle").value.trim();if(!title){alert("Enter a title.");return;}var p=gpr();p.changeOrders=p.changeOrders||[];p.changeOrders.push({title:title,type:document.getElementById("coType").value,description:document.getElementById("coDesc").value.trim(),budgetImpact:parseFloat(document.getElementById("coBudget").value)||0,date:document.getElementById("coDate").value,status:document.getElementById("coStatus").value});saveP(p,"Change order '"+title+"' added to "+p.client);}
function delCO(i){if(!confirm("Delete?"))return;var p=gpr();p.changeOrders.splice(i,1);saveP(p);}
function updateCOStatus(i,v){var p=gpr();var old=p.changeOrders[i].status;p.changeOrders[i].status=v;saveP(p,old!==v?"Change order '"+p.changeOrders[i].title+"' "+v+" on "+p.client:null);}
function addLog(){var work=document.getElementById("logWork").value.trim();if(!work){alert("Enter work completed.");return;}var p=gpr();p.dailyLogs=p.dailyLogs||[];p.dailyLogs.push({date:document.getElementById("logDate").value,weather:document.getElementById("logWeather").value.trim(),crew:document.getElementById("logCrew").value.trim(),work:work,issues:document.getElementById("logIssues").value.trim()});saveP(p,"Daily log added to "+p.client);}

function addNote(){var text=document.getElementById("noteText").value.trim();if(!text){alert("Enter an action item.");return;}var p=gpr();p.notesLog=p.notesLog||[];p.notesLog.push({text:text,author:document.getElementById("noteAuthor").value.trim(),ts:Date.now(),resolved:false});saveP(p,"Action item added to "+p.client);}
function delNote(i){if(!confirm("Delete?"))return;var p=gpr();p.notesLog.splice(i,1);saveP(p);}
function toggleNote(i){var p=gpr();p.notesLog[i].resolved=!p.notesLog[i].resolved;saveP(p,p.notesLog[i].resolved?"Action item resolved on "+p.client:null);}
function deleteProject(){if(!confirm("Delete project? Cannot be undone."))return;col.doc(currentId).delete().then(function(){document.getElementById("detailPage").classList.remove("show");T("Deleted");});}
function populateStatus(val){document.getElementById("fStatus").innerHTML=DD.projectStatuses.map(function(x){return'<option'+(x===(val||DD.projectStatuses[0])?" selected":"")+'>'+x+'</option>';}).join("");}
function renderCP(){document.getElementById("cpick").innerHTML=COLORS.map(function(c,i){return'<div class="cdot" style="background:'+c+';border-color:'+(i===selColor?"#1A1A2E":"transparent")+'" data-ci="'+i+'"></div>';}).join("");document.querySelectorAll(".cdot").forEach(function(d){d.onclick=function(){selColor=parseInt(this.getAttribute("data-ci"));renderCP();};});}
function openAdd(){editId=null;document.getElementById("addPageTitle").textContent="New Project";["fClient","fType","fAddress","fPm","fStart","fEnd","fBudget","fSpent","fNotes"].forEach(function(id){document.getElementById(id).value="";});populateStatus();selColor=0;renderCP();var ap=document.getElementById("addPage");ap.classList.add("show");ap.scrollTop=0;}
function openEditProject(){var p=gpr();editId=p.id;document.getElementById("addPageTitle").textContent="Edit Project";document.getElementById("fClient").value=p.client||"";document.getElementById("fType").value=p.type||"";document.getElementById("fAddress").value=p.address||"";document.getElementById("fPm").value=p.pm||"";document.getElementById("fStart").value=p.startDate||"";document.getElementById("fEnd").value=p.endDate||"";document.getElementById("fBudget").value=p.budget||"";document.getElementById("fSpent").value=p.spent||"";document.getElementById("fNotes").value=p.notes||"";populateStatus(p.status);selColor=Math.max(0,COLORS.indexOf(p.color));renderCP();var ap=document.getElementById("addPage");ap.classList.add("show");ap.scrollTop=0;}
function saveProject(){var client=document.getElementById("fClient").value.trim(),type=document.getElementById("fType").value.trim();if(!client||!type){alert("Client name and project type required.");return;}var id=editId||("p"+Date.now()),existing=editId?(gpr()||{}):{};var p=Object.assign({},existing,{id:id,client:client,type:type,address:document.getElementById("fAddress").value.trim(),pm:document.getElementById("fPm").value.trim(),startDate:document.getElementById("fStart").value,endDate:document.getElementById("fEnd").value,budget:parseFloat(document.getElementById("fBudget").value)||0,spent:parseFloat(document.getElementById("fSpent").value)||0,status:document.getElementById("fStatus").value,notes:document.getElementById("fNotes").value.trim(),color:COLORS[selColor],choices:existing.choices||[],phases:existing.phases||[],costs:existing.costs||[],punchList:existing.punchList||[],changeOrders:existing.changeOrders||[],dailyLogs:existing.dailyLogs||[],notesLog:existing.notesLog||[]});col.doc(id).set(p).then(function(){T(editId?"✅ Updated!":"✅ Added!");pushNotification(editId?"Project '"+client+"' updated":"New project '"+client+"' created");document.getElementById("addPage").classList.remove("show");if(editId)currentId=id;}).catch(function(){T("❌ Error");});}
function openSettings(){renderTeamList();document.getElementById("companyName").value=DD.companyName||"Spence Contracting";renderTagSet("psTagsEl","projectStatuses");renderTagSet("ptTagsEl","phaseTypes");renderTagSet("csTagsEl","choiceStatuses");renderTagSet("ccTagsEl","costCategories");renderTagSet("coTagsEl","changeOrderTypes");renderTagSet("plTagsEl","punchCategories");renderTagSet("elTagsEl","estCategories");document.getElementById("settingsPage").classList.add("show");}
function closeSettings(){document.getElementById("settingsPage").classList.remove("show");}
function renderTagSet(elId,key){document.getElementById(elId).innerHTML=(DD[key]||[]).map(function(s,i){return'<span class="tag">'+s+'<button onclick="removeTag(\''+key+'\','+i+',\''+elId+'\')">×</button></span>';}).join("");}
function addTag(key,inputId,elId){var v=document.getElementById(inputId).value.trim();if(!v||(DD[key]||[]).indexOf(v)>=0)return;DD[key]=DD[key]||[];DD[key].push(v);document.getElementById(inputId).value="";renderTagSet(elId,key);saveSettings();}
function removeTag(key,i,elId){DD[key].splice(i,1);renderTagSet(elId,key);saveSettings();}

document.getElementById("btnNew").onclick=openAdd;
document.getElementById("cancelBtn").onclick=function(){document.getElementById("addPage").classList.remove("show");};
document.getElementById("saveBtn").onclick=saveProject;
document.getElementById("searchInput").oninput=renderCards;

loadSettings(function(){startSync();startNotifSync();checkClientView();});
