<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spence Contracting</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;min-height:100vh}
button,select,input,textarea{-webkit-appearance:none;font-family:inherit}

/* NAV */
.topbar{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
.sync-bar{background:#162236;padding:5px 16px;display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.45);gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s}

/* BUTTONS */
.btn-orange{background:#E8713A;border:none;border-radius:9px;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-dark{background:#1A1A2E;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-green{background:#2EAA72;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-red{background:#E83A6C;border:none;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn-ghost{background:#fff;border:1.5px solid #E0E0E0;border-radius:10px;color:#666;padding:12px;font-size:14px;cursor:pointer;flex:1}
.btn-dashed{width:100%;padding:12px;border:1.5px dashed #CCC;border-radius:10px;background:#fff;color:#888;font-size:13px;cursor:pointer;margin-top:6px;text-align:center}

/* BACK BUTTON — large tap target */
.back-btn{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:#fff;font-size:20px;font-weight:700;width:44px;height:44px;cursor:pointer;flex-shrink:0;margin-right:8px}

/* PAGES */
.page{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:40;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.show{display:block}
.phead{background:#1A1A2E;padding:0 16px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:10}
.phead-title{color:#fff;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:8px}

/* TABS */
.ptabs{display:flex;background:#fff;border-bottom:1px solid #EBEBEB;overflow-x:auto;position:sticky;top:56px;z-index:9;-webkit-overflow-scrolling:touch}
.ptab{border:none;background:none;padding:14px 16px;font-size:13px;color:#aaa;border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;min-height:48px;cursor:pointer}
.ptab.on{color:#1A1A2E;font-weight:700}
.pbody{padding:14px 14px 100px}

/* FORM PAGES */
.fpage{display:none;position:fixed;inset:0;background:#F4F5F7;z-index:60;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fpage.show{display:block}

/* FORM FIELDS */
.fi{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:11px 12px;font-size:14px;outline:none;color:#333;background:#fff}
.fl{font-size:10px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;display:block}
.fg{display:grid;gap:12px;margin-bottom:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fbtns{display:flex;gap:10px}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer}

/* CARDS */
.card{background:#fff;border-radius:14px;padding:16px;border:1.5px solid #EBEBEB;cursor:pointer;margin-bottom:12px}
.card-name{font-size:15px;font-weight:700;color:#1A1A2E}
.card-sub{font-size:11px;color:#888;margin-top:3px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.brow{margin-bottom:8px}
.blr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#aaa}
.bt{background:#EEE;border-radius:5px;height:6px}
.bf{height:100%;border-radius:5px;transition:width .3s}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.scard{background:#fff;border-radius:11px;padding:11px 10px;border:1px solid #EBEBEB}
.scard .si{font-size:15px;margin-bottom:3px}
.scard .sv{font-size:17px;font-weight:700;color:#1A1A2E}
.scard .sl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}

/* DETAIL CONTENT */
.wcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:4px}
.item-card{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;border:1px solid #F0F0F0}
.del-btn{background:none;border:none;color:#E83A6C;font-size:22px;padding:2px 6px;line-height:1;cursor:pointer;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bva-row{display:flex;gap:8px;margin-top:8px}
.bva-box{flex:1;background:#F8F8F8;border-radius:8px;padding:8px 10px}
.bva-label{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.bva-val{font-size:14px;font-weight:700}
.bva-diff{font-size:10px;margin-top:2px}
.inline-form{background:#EEF2F7;border-radius:12px;padding:14px;margin-top:8px;border:1.5px solid #DDE3EC;display:none}
.iboxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ibox{background:#fff;border-radius:10px;padding:12px 14px}
.ibl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.ibv{font-size:15px;font-weight:700;color:#1A1A2E;margin-top:2px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sbox{background:#fff;border-radius:10px;padding:12px}
.sbox-label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.sbox-val{font-size:16px;font-weight:700;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:6px;background:#EEF4FF;color:#2855B8;border-radius:20px;padding:5px 12px;font-size:13px;margin:3px}
.tag button{background:none;border:none;color:#E83A6C;font-size:17px;line-height:1;padding:0;cursor:pointer}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{border:1.5px solid #E0E0E0;background:#fff;color:#666;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.fb.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
.controls{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
#cards{padding:0 14px 80px}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>

</head>
<body>

<!-- MAIN LIST -->

<div id="mainView">
  <div class="topbar">
    <h1>🏗️ Spence Contracting</h1>
    <div style="display:flex;gap:8px">
      <button class="btn-orange" style="background:rgba(255,255,255,0.15)" onclick="openSettings()">⚙️</button>
      <button class="btn-orange" id="btnNew">+ New</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sdot" id="syncDot"></div><span id="syncLabel">Connecting...</span></div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input class="fi" id="searchInput" placeholder="Search projects..." type="search"/>
    <div class="filters" id="filters"></div>
  </div>
  <div id="cards"><div class="empty">Loading...</div></div>
</div>

<!-- PROJECT DETAIL -->

<div class="page" id="detailPage">
  <div class="phead">
    <button class="back-btn" id="backBtn">‹</button>
    <span class="phead-title" id="dName"></span>
    <span class="pbadge" id="dBadge"></span>
  </div>
  <div class="ptabs" id="tabs"></div>
  <div class="pbody" id="tabBody"></div>
</div>

<!-- ADD / EDIT PROJECT -->

<div class="fpage" id="addPage">
  <div class="phead">
    <button class="back-btn" id="addBackBtn">‹</button>
    <span class="phead-title" id="addPageTitle">New Project</span>
  </div>
  <div style="padding:14px">
    <div class="fg">
      <div><label class="fl">Client Name *</label><input class="fi" id="fClient" placeholder="e.g. Johnson Residence"/></div>
      <div><label class="fl">Project Type *</label><input class="fi" id="fType" placeholder="e.g. Kitchen Remodel"/></div>
      <div><label class="fl">Address</label><input class="fi" id="fAddress" placeholder="123 Main St"/></div>
      <div><label class="fl">Project Manager</label><input class="fi" id="fPm" placeholder="Name"/></div>
      <div class="fr2">
        <div><label class="fl">Start Date</label><input class="fi" id="fStart" type="date"/></div>
        <div><label class="fl">End Date</label><input class="fi" id="fEnd" type="date"/></div>
      </div>
      <div class="fr2">
        <div><label class="fl">Budget ($)</label><input class="fi" id="fBudget" type="number" placeholder="0"/></div>
        <div><label class="fl">Spent ($)</label><input class="fi" id="fSpent" type="number" placeholder="0"/></div>
      </div>
      <div><label class="fl">Status</label><select class="fi" id="fStatus"></select></div>
      <div><label class="fl">Notes</label><textarea class="fi" id="fNotes" rows="3" placeholder="Key contacts, special instructions..."></textarea></div>
      <div><label class="fl">Color</label><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="fbtns">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-dark" style="flex:2" id="saveBtn">Save Project</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->

<div class="fpage" id="settingsPage">
  <div class="phead">
    <button class="back-btn" onclick="closeSettings()">‹</button>
    <span class="phead-title">Settings & Dropdowns</span>
  </div>
  <div style="padding:14px">
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Project Statuses</label><div id="psTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="psInput" placeholder="Add status..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('projectStatuses','psInput','psTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Phase Types</label><div id="ptTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="ptInput" placeholder="Add phase..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('phaseTypes','ptInput','ptTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Selection Statuses</label><div id="csTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="csInput" placeholder="Add status..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('choiceStatuses','csInput','csTagsEl')">Add</button></div></div>
    <div class="wcard"><label class="fl" style="margin-bottom:8px">Cost Categories</label><div id="ccTagsEl"></div><div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="ccInput" placeholder="Add category..." style="flex:1"/><button class="btn-orange" style="padding:10px 14px;flex-shrink:0" onclick="addTag('costCategories','ccInput','ccTagsEl')">Add</button></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCnpDrdLOH_RhCFK9MSD--KWDy--vZmeao",
  authDomain:"spence-contracting.firebaseapp.com",
  projectId:"spence-contracting",
  storageBucket:"spence-contracting.firebasestorage.app",
  messagingSenderId:"696245066965",
  appId:"1:696245066965:web:de13db6e678f40cf5ed65c"
});
var db=firebase.firestore(),col=db.collection("projects"),sCol=db.collection("settings");

var DD={
  projectStatuses:["Planning","In Progress","On Hold","Completed"],
  phaseTypes:["Site Prep","Demo","Rough-In","Framing","Insulation","Drywall","MEP (Plumbing/Elec/HVAC)","Flooring","Tile Work","Cabinets & Millwork","Paint","Fixtures & Hardware","Punch List"],
  choiceStatuses:["Pending","Quoted","Ordered","Confirmed","In Stock","Delivered","Installed","Rejected"],
  costCategories:["Labor","Materials","Subcontractor","Equipment","Permits & Fees","Design","Contingency","Other"]
};

var COLORS=["#E8713A","#3A78E8","#2EAA72","#9B6BE8","#E8B43A","#E83A6C"];
var STATUS_COLORS=["#E8713A","#3A78E8","#2EAA72","#999","#E8B43A","#9B6BE8"];
var projects=[],activeFilter="All",currentId=null,currentTab="timeline",selColor=0,editId=null;

var SEED=[
  {id:"s1",client:"Hargrove Residence",address:"4821 Maple Ridge Dr",type:"Kitchen Remodel",status:"In Progress",startDate:"2026-03-10",endDate:"2026-05-15",budget:48000,spent:22400,pm:"Danny Cruz",color:"#E86C3A",notes:"Key contact: Sarah Hargrove 555-0182.",
   phases:[{name:"Demo",start:"2026-03-10",end:"2026-03-14",phaseBudget:2000,phaseActual:1800,complete:"Complete"},{name:"Rough-In",start:"2026-03-15",end:"2026-03-28",phaseBudget:8000,phaseActual:8200,complete:"Complete"},{name:"Cabinets",start:"2026-04-01",end:"2026-04-18",phaseBudget:12000,phaseActual:0,complete:"In Progress"},{name:"Punch List",start:"2026-05-08",end:"2026-05-15",phaseBudget:1500,phaseActual:0,complete:"Not Started"}],
   choices:[{category:"Cabinetry",item:"Shaker White Maple",vendor:"KraftMaid",status:"Ordered",notes:"Lead time 6 wks",budgetAmt:12000,actualAmt:11800}],
   costs:[{category:"Labor",description:"Framing crew",budgetAmt:8000,actualAmt:8200},{category:"Materials",description:"Lumber & drywall",budgetAmt:5000,actualAmt:4800}]},
  {id:"s2",client:"Vega Commercial",address:"110 Commerce Blvd",type:"Office Build-Out",status:"Planning",startDate:"2026-05-01",endDate:"2026-07-30",budget:135000,spent:8200,pm:"Rena Okafor",color:"#3A78E8",notes:"Coordinate with building management.",phases:[],choices:[],costs:[]},
  {id:"s3",client:"Thornfield Estate",address:"8 Crestview Lane",type:"Master Bath",status:"Completed",startDate:"2026-01-06",endDate:"2026-03-28",budget:62000,spent:59800,pm:"Danny Cruz",color:"#2EAA72",notes:"Final walkthrough completed 3/28.",phases:[],choices:[],costs:[]}
];

// helpers
function T(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function fmt(d){if(!d)return"—";var p=d.split("-");return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1])-1]+" "+parseInt(p[2]);}
function dl(e){return Math.ceil((new Date(e)-new Date())/86400000);}
function gp(p){if(!p.phases||!p.phases.length)return 0;var d=p.phases.filter(function(x){return x.complete==="Complete";}).length;return Math.round(d/p.phases.length*100);}
function gpr(){return projects.find(function(x){return x.id===currentId;});}
function sc(s){var i=DD.projectStatuses.indexOf(s);var c=STATUS_COLORS[i%STATUS_COLORS.length]||"#999";return{bg:c+"22",text:c,dot:c};}
function bva(b,a){var b2=parseFloat(b)||0,a2=parseFloat(a)||0,diff=b2-a2,over=diff<0;return{b:b2,a:a2,diff:Math.abs(diff),over:over};}
function bvaHtml(b,a,label){
  var v=bva(b,a);
  var diffColor=v.over?"#E83A6C":"#2EAA72";
  var diffLabel=v.over?"$"+v.diff.toLocaleString()+" over":"$"+v.diff.toLocaleString()+" under";
  return'<div class="bva-row">'
    +'<div class="bva-box"><div class="bva-label">Budget</div><div class="bva-val" style="color:#1A1A2E">$'+v.b.toLocaleString()+'</div></div>'
    +'<div class="bva-box"><div class="bva-label">Actual</div><div class="bva-val" style="color:#E8713A">$'+v.a.toLocaleString()+'</div></div>'
    +'<div class="bva-box"><div class="bva-label">Variance</div><div class="bva-val" style="color:'+diffColor+'">'+diffLabel+'</div></div>'
    +'</div>';
}

function setSS(s){var dot=document.getElementById("syncDot"),lbl=document.getElementById("syncLabel");if(s==="live"){dot.style.background="#2EAA72";lbl.textContent="Live sync on";}else if(s==="saving"){dot.style.background="#E8B43A";lbl.textContent="Saving...";}else if(s==="error"){dot.style.background="#E83A6C";lbl.textContent="Sync error";}}

function loadSettings(cb){
  sCol.doc("dropdowns").get().then(function(d){
    if(d.exists)DD=Object.assign({},DD,d.data());
    if(cb)cb();
  }).catch(function(){if(cb)cb();});
}
function saveSettings(){sCol.doc("dropdowns").set(DD).then(function(){T("✅ Settings saved!");});}
function saveP(p){setSS("saving");return col.doc(p.id).set(p).then(function(){T("✅ Saved!");}).catch(function(){T("❌ Error saving");setSS("error");});}

function startSync(){
  col.orderBy("client").onSnapshot(function(snap){
    if(snap.empty){var b=db.batch();SEED.forEach(function(p){b.set(col.doc(p.id),p);});b.commit();return;}
    projects=[];snap.forEach(function(d){projects.push(d.data());});
    setSS("live");renderAll();
    if(currentId&&document.getElementById("detailPage").classList.contains("show")){var p=gpr();if(p){renderTabs(p);renderTabBody(p);}}
  },function(){setSS("error");});
}

function renderAll(){renderStats();renderFilters();renderCards();}

function renderStats(){
  var total=projects.length,active=projects.filter(function(p){return p.status==="In Progress";}).length;
  var budget=projects.reduce(function(a,p){return a+(p.budget||0);},0),spent=projects.reduce(function(a,p){return a+(p.spent||0);},0);
  document.getElementById("stats").innerHTML=[["📁","Jobs",total],["⚡","Active",active],["💰","Budget","$"+(budget/1000).toFixed(0)+"k"],["📊","Spent","$"+(spent/1000).toFixed(0)+"k"]].map(function(d){return'<div class="scard"><div class="si">'+d[0]+'</div><div class="sv">'+d[2]+'</div><div class="sl">'+d[1]+'</div></div>';}).join("");
}

function renderFilters(){
  document.getElementById("filters").innerHTML=["All"].concat(DD.projectStatuses).map(function(s){return'<button class="fb'+(s===activeFilter?" on":"")+'" data-f="'+s+'">'+s+'</button>';}).join("");
  document.querySelectorAll(".fb").forEach(function(b){b.onclick=function(){activeFilter=this.getAttribute("data-f");renderFilters();renderCards();};});
}

function renderCards(){
  var q=document.getElementById("searchInput").value.toLowerCase();
  var f=projects.filter(function(p){return(activeFilter==="All"||p.status===activeFilter)&&(!q||(p.client||"").toLowerCase().includes(q)||(p.type||"").toLowerCase().includes(q));});
  var el=document.getElementById("cards");
  if(!f.length){el.innerHTML='<div class="empty">No projects found.<br>Tap <b>+ New</b> to add one.</div>';return;}
  el.innerHTML=f.map(function(p){
    var s=sc(p.status),pct=Math.round((p.spent||0)/((p.budget||1))*100),pr=gp(p);
    var days=dl(p.endDate),dc=p.status!=="Completed"&&days<14?"#C4511A":"#555";
    var dt=p.status!=="Completed"?" ("+(days>0?days+"d left":"Overdue")+")":"";
    return'<div class="card" data-id="'+p.id+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px">'
      +'<div><div class="card-name">'+p.client+'</div><div class="card-sub">'+p.type+' · '+(p.address||"")+'</div></div>'
      +'<span class="badge" style="background:'+s.bg+';color:'+s.text+'"><span class="bdot" style="background:'+s.dot+'"></span>'+p.status+'</span></div>'
      +'<div style="display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap">'
      +'<div><div class="sl" style="font-size:9px;color:#bbb;text-transform:uppercase">PM</div><div style="font-size:12px;font-weight:600;color:#333">'+(p.pm||"—")+'</div></div>'
      +'<div><div class="sl" style="font-size:9px;color:#bbb;text-transform:uppercase">Deadline</div><div style="font-size:12px;font-weight:600;color:'+dc+'">'+fmt(p.endDate)+dt+'</div></div>'
      +'<div><div class="sl" style="font-size:9px;color:#bbb;text-transform:uppercase">Budget</div><div style="font-size:12px;font-weight:600;color:#333">$'+(p.budget||0).toLocaleString()+'</div></div></div>'
      +'<div class="brow"><div class="blr"><span>Phase Progress</span><span>'+pr+'%</span></div><div class="bt"><div class="bf" style="width:'+pr+'%;background:'+(p.color||"#E8713A")+'"></div></div></div>'
      +'<div class="brow"><div class="blr"><span>Budget Used</span><span>'+pct+'%</span></div><div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:'+(pct>90?"#E8713A":"#2EAA72")+'"></div></div></div>'
      +'</div>';

function choiceColor(s){return{Confirmed:”#2EAA72”,Installed:”#2EAA72”,Delivered:”#2EAA72”,“In Stock”:”#3A78E8”,Ordered:”#3A78E8”,Pending:”#E8B43A”,Quoted:”#9B6BE8”,Rejected:”#E83A6C”}[s]||”#999”;}
function showForm(id){var el=document.getElementById(id);if(el)el.style.display=“block”;}
function hideForm(id){var el=document.getElementById(id);if(el)el.style.display=“none”;}

// Phase
function addPhase(){
var sel=document.getElementById(“pSel”),name=sel.value===”**c**”?document.getElementById(“pCustom”).value.trim():sel.value;
if(!name){alert(“Enter a phase name.”);return;}
var p=gpr();p.phases=p.phases||[];
p.phases.push({name:name,start:document.getElementById(“pSt”).value,end:document.getElementById(“pEn”).value,phaseBudget:parseFloat(document.getElementById(“pBud”).value)||0,phaseActual:parseFloat(document.getElementById(“pAct”).value)||0,complete:“Not Started”});
saveP(p);
}
function delPhase(i){if(!confirm(“Delete phase?”))return;var p=gpr();p.phases.splice(i,1);saveP(p);}
function updatePhaseStatus(i,v){var p=gpr();p.phases[i].complete=v;saveP(p);}
function updatePhaseBudget(i,k,v){var p=gpr();p.phases[i][k]=parseFloat(v)||0;saveP(p);}

// Choice
function addChoice(){
var cat=document.getElementById(“cCat”).value.trim(),item=document.getElementById(“cItem”).value.trim();
if(!cat||!item){alert(“Enter category and item.”);return;}
var p=gpr();p.choices=p.choices||[];
p.choices.push({category:cat,item:item,vendor:document.getElementById(“cVend”).value.trim(),notes:document.getElementById(“cNotes”).value.trim(),status:document.getElementById(“cStat”).value,budgetAmt:parseFloat(document.getElementById(“cBud”).value)||0,actualAmt:parseFloat(document.getElementById(“cAct”).value)||0});
saveP(p);
}
function delChoice(i){if(!confirm(“Delete selection?”))return;var p=gpr();p.choices.splice(i,1);saveP(p);}
function updateChoiceStatus(i,v){var p=gpr();p.choices[i].status=v;saveP(p);}
function updateChoiceAmt(i,k,v){var p=gpr();p.choices[i][k]=parseFloat(v)||0;saveP(p);}

// Cost
function addCost(){
var p=gpr();p.costs=p.costs||[];
var b=parseFloat(document.getElementById(“costB”).value)||0,a=parseFloat(document.getElementById(“costA”).value)||0;
p.costs.push({category:document.getElementById(“costCat”).value,description:document.getElementById(“costDesc”).value.trim(),budgetAmt:b,actualAmt:a});
p.spent=(p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0));
saveP(p);
}
function delCost(i){if(!confirm(“Delete cost?”))return;var p=gpr();p.costs.splice(i,1);p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function updateCostAmt(i,k,v){var p=gpr();p.costs[i][k]=parseFloat(v)||0;p.spent=p.costs.reduce(function(s,c){return s+(c.actualAmt||0);},0);saveP(p);}
function saveBudgetTotals(){var p=gpr();p.budget=parseFloat(document.getElementById(“bBud”).value)||0;p.spent=parseFloat(document.getElementById(“bSpt”).value)||0;saveP(p);}
function saveNotes(){var p=gpr();p.notes=document.getElementById(“notesInput”).value;saveP(p);}
function deleteProject(){if(!confirm(“Delete project? Cannot be undone.”))return;col.doc(currentId).delete().then(function(){document.getElementById(“detailPage”).classList.remove(“show”);T(“Deleted”);});}

// Add / Edit project
function populateStatus(val){
var s=document.getElementById(“fStatus”);
s.innerHTML=DD.projectStatuses.map(function(x){return’<option’+(x===(val||DD.projectStatuses[0])?” selected”:””)+’>’+x+’</option>’;}).join(””);
}
function renderCP(){
document.getElementById(“cpick”).innerHTML=COLORS.map(function(c,i){return’<div class=“cdot” style=“background:’+c+’;border-color:’+(i===selColor?”#1A1A2E”:“transparent”)+’” data-ci=”’+i+’”></div>’;}).join(””);
document.querySelectorAll(”.cdot”).forEach(function(d){d.onclick=function(){selColor=parseInt(this.getAttribute(“data-ci”));renderCP();};});
}
function openAdd(){
editId=null;document.getElementById(“addPageTitle”).textContent=“New Project”;
[“fClient”,“fType”,“fAddress”,“fPm”,“fStart”,“fEnd”,“fBudget”,“fSpent”,“fNotes”].forEach(function(id){document.getElementById(id).value=””;});
populateStatus();selColor=0;renderCP();
var ap=document.getElementById(“addPage”);ap.classList.add(“show”);ap.scrollTop=0;
}
function openEditProject(){
var p=gpr();editId=p.id;document.getElementById(“addPageTitle”).textContent=“Edit Project”;
document.getElementById(“fClient”).value=p.client||””;document.getElementById(“fType”).value=p.type||””;
document.getElementById(“fAddress”).value=p.address||””;document.getElementById(“fPm”).value=p.pm||””;
document.getElementById(“fStart”).value=p.startDate||””;document.getElementById(“fEnd”).value=p.endDate||””;
document.getElementById(“fBudget”).value=p.budget||””;document.getElementById(“fSpent”).value=p.spent||””;
document.getElementById(“fNotes”).value=p.notes||””;
populateStatus(p.status);selColor=Math.max(0,COLORS.indexOf(p.color));renderCP();
var ap=document.getElementById(“addPage”);ap.classList.add(“show”);ap.scrollTop=0;
}
function saveProject(){
var client=document.getElementById(“fClient”).value.trim(),type=document.getElementById(“fType”).value.trim();
if(!client||!type){alert(“Client name and project type required.”);return;}
var id=editId||(“p”+Date.now()),existing=editId?(gpr()||{}):{};
var p=Object.assign({},existing,{id:id,client:client,type:type,address:document.getElementById(“fAddress”).value.trim(),pm:document.getElementById(“fPm”).value.trim(),startDate:document.getElementById(“fStart”).value,endDate:document.getElementById(“fEnd”).value,budget:parseFloat(document.getElementById(“fBudget”).value)||0,spent:parseFloat(document.getElementById(“fSpent”).value)||0,status:document.getElementById(“fStatus”).value,notes:document.getElementById(“fNotes”).value.trim(),color:COLORS[selColor],choices:existing.choices||[],phases:existing.phases||[],costs:existing.costs||[]});
col.doc(id).set(p).then(function(){T(editId?“✅ Updated!”:“✅ Added!”);document.getElementById(“addPage”).classList.remove(“show”);if(editId)currentId=id;}).catch(function(){T(“❌ Error”);});
}

// Settings
function openSettings(){renderTagSet(“psTagsEl”,“projectStatuses”);renderTagSet(“ptTagsEl”,“phaseTypes”);renderTagSet(“csTagsEl”,“choiceStatuses”);renderTagSet(“ccTagsEl”,“costCategories”);document.getElementById(“settingsPage”).classList.add(“show”);}
function closeSettings(){document.getElementById(“settingsPage”).classList.remove(“show”);}
function renderTagSet(elId,key){document.getElementById(elId).innerHTML=DD[key].map(function(s,i){return’<span class="tag">’+s+’<button onclick="removeTag(\''+key+'\','+i+',\''+elId+'\')">×</button></span>’;}).join(””);}
function addTag(key,inputId,elId){var v=document.getElementById(inputId).value.trim();if(!v||DD[key].indexOf(v)>=0)return;DD[key].push(v);document.getElementById(inputId).value=””;renderTagSet(elId,key);saveSettings();}
function removeTag(key,i,elId){DD[key].splice(i,1);renderTagSet(elId,key);saveSettings();}

// Wire up
document.getElementById(“btnNew”).onclick=openAdd;
document.getElementById(“backBtn”).onclick=function(){document.getElementById(“detailPage”).classList.remove(“show”);};
document.getElementById(“addBackBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“cancelBtn”).onclick=function(){document.getElementById(“addPage”).classList.remove(“show”);};
document.getElementById(“saveBtn”).onclick=saveProject;
document.getElementById(“searchInput”).oninput=renderCards;

loadSettings(function(){startSync();});
